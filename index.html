<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PhoneClicker Test-3A</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>📱</text></svg>">
    <style>
        :root {
            --neon-pink: #ff2d75;
            --neon-blue: #00d4ff;
            --neon-purple: #b347ea;
            --neon-green: #39ff14;
            --neon-yellow: #ffe600;
            --forbidden-red: #dc143c;
            --bg-dark: #0a0a0f;
            --glass: rgba(16, 18, 27, 0.8);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-dark);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; min-height: 100dvh;
            padding: 12px; color: #fff;
            -webkit-user-select: none; user-select: none;
            overflow-x: hidden;
            background-image: 
                radial-gradient(ellipse at 20% 50%, rgba(255,45,117,0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(0,212,255,0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(179,71,234,0.15) 0%, transparent 50%);
        }
        .particles {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }
        .particle {
            position: absolute; background: var(--neon-blue);
            border-radius: 50%; opacity: 0.6;
            animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.8; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }
        .game-container {
            position: relative; z-index: 1;
            background: var(--glass);
            backdrop-filter: blur(20px);
            padding: 20px 16px; border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,45,117,0.3);
            width: 100%; max-width: 420px;
            transition: all 0.3s ease;
        }
        h1 {
            font-size: 28px; font-weight: 900; letter-spacing: 1px;
            background: linear-gradient(135deg, var(--neon-pink), var(--neon-blue));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; margin-bottom: 2px; text-align: center;
        }
        .status {
            text-align: center; font-size: 11px; color: rgba(255,255,255,0.5);
            letter-spacing: 2px; margin-bottom: 15px; text-transform: uppercase;
        }
        .menu-bar {
            display: flex; gap: 8px; margin-bottom: 15px;
            background: rgba(0,0,0,0.4); border-radius: 20px; padding: 4px;
        }
        .menu-btn {
            flex: 1; background: transparent; border: none;
            color: rgba(255,255,255,0.6); font-size: 13px; font-weight: bold;
            padding: 10px 6px; border-radius: 18px; cursor: pointer;
            transition: all 0.3s; position: relative; overflow: hidden;
        }
        .menu-btn.active {
            background: rgba(255,45,117,0.25); color: #fff;
            box-shadow: 0 0 15px rgba(255,45,117,0.4);
        }
        .menu-btn::after {
            content: ''; position: absolute; inset: 0; border-radius: 18px;
            opacity: 0; transition: opacity 0.3s;
            background: linear-gradient(135deg, var(--neon-pink), var(--neon-blue));
            z-index: -1; filter: blur(10px);
        }
        .menu-btn.active::after { opacity: 0.5; }
        .screen { display: none; animation: screenIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .screen.active { display: block; }
        @keyframes screenIn {
            0% { opacity: 0; transform: translateY(10px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .phone-display {
            background: rgba(0,0,0,0.5); border-radius: 24px; padding: 25px 16px;
            margin-bottom: 15px; text-align: center;
            border: 2px solid transparent;
            transition: all 0.4s ease;
            position: relative; overflow: hidden;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .phone-display::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(255,255,255,0.1), transparent, rgba(255,255,255,0.1), transparent);
            animation: rotateGlow 10s linear infinite;
            opacity: 0.3;
        }
        @keyframes rotateGlow { 100% { transform: rotate(360deg); } }
        #phoneEmoji {
            font-size: 80px; display: block; position: relative; z-index: 1;
            filter: drop-shadow(0 0 15px currentColor);
            animation: bounceIn 0.5s;
        }
        @keyframes bounceIn {
            0% { transform: scale(0); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        .phone-name {
            font-size: 28px; font-weight: 800; margin-top: 8px; position: relative; z-index: 1;
        }
        .phone-model { font-size: 16px; color: rgba(255,255,255,0.7); position: relative; z-index: 1; }
        .timer {
            font-size: 28px; font-weight: 900; letter-spacing: 2px;
            text-align: center; margin: 5px 0; padding: 8px;
            background: rgba(0,0,0,0.6); border-radius: 16px;
            color: var(--neon-yellow); text-shadow: 0 0 10px var(--neon-yellow);
            font-variant-numeric: tabular-nums;
            border: 1px solid rgba(255,230,0,0.3);
        }
        .btn-row { display: flex; gap: 8px; margin-top: 8px; }
        .btn {
            border: none; width: 100%; padding: 14px; border-radius: 30px;
            font-weight: bold; font-size: 16px; letter-spacing: 1px;
            cursor: pointer; transition: all 0.2s; position: relative;
            overflow: hidden; text-transform: uppercase;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--neon-pink), #c0392b);
            color: #fff; box-shadow: 0 6px 20px rgba(255,45,117,0.5);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .btn-primary:active { transform: scale(0.96); box-shadow: 0 4px 10px rgba(255,45,117,0.7); }
        .btn-primary:disabled {
            background: #3a3a4a; box-shadow: none; color: #888; border-color: transparent;
            cursor: not-allowed;
        }
        .btn-case {
            background: linear-gradient(135deg, #4a00e0, #8e2de2);
            color: #fff; box-shadow: 0 6px 20px rgba(138,43,226,0.5);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .btn-case:active { transform: scale(0.96); box-shadow: 0 4px 10px rgba(138,43,226,0.7); }
        .btn-case:disabled {
            background: #3a3a4a; box-shadow: none; color: #888; border-color: transparent;
            cursor: not-allowed;
        }
        .btn-reset {
            background: transparent; color: rgba(255,255,255,0.6); font-size: 13px;
            border: 1px solid rgba(255,255,255,0.15); margin-bottom: 12px; padding: 10px;
            box-shadow: none;
        }
        .stats-row { display: flex; gap: 8px; margin-top: 12px; }
        .stat-box {
            flex: 1; background: rgba(0,0,0,0.5); border-radius: 16px;
            padding: 12px 4px; text-align: center; backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .stat-value { font-size: 22px; font-weight: 900; color: var(--neon-pink); }
        .stat-label { font-size: 10px; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 1px; }
        .list-container {
            background: rgba(0,0,0,0.5); border-radius: 24px; padding: 12px;
            max-height: 400px; overflow-y: auto; backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .inv-item, .achieve-item {
            display: flex; align-items: center; gap: 12px; padding: 12px 8px;
            border-bottom: 1px solid rgba(255,255,255,0.08); transition: background 0.3s;
            border-radius: 12px;
        }
        .inv-item:active, .achieve-item:active { background: rgba(255,45,117,0.15); }
        .inv-item:last-child, .achieve-item:last-child { border-bottom: none; }
        .inv-icon { font-size: 32px; filter: drop-shadow(0 0 5px currentColor); }
        .inv-info { flex: 1; }
        .inv-name { font-weight: bold; font-size: 16px; }
        .inv-count {
            background: rgba(255,45,117,0.2); color: var(--neon-pink);
            padding: 5px 12px; border-radius: 20px; font-size: 14px; font-weight: bold;
        }
        .achieve-icon { font-size: 36px; opacity: 0.2; transition: all 0.5s; }
        .achieve-item.unlocked .achieve-icon { opacity: 1; filter: drop-shadow(0 0 10px currentColor); }
        .achieve-info { flex: 1; }
        .achieve-name { font-weight: bold; font-size: 16px; }
        .achieve-desc { font-size: 12px; color: rgba(255,255,255,0.5); }
        .achieve-item:not(.unlocked) .achieve-name { color: #555; }
        .empty-msg { text-align: center; padding: 30px; color: rgba(255,255,255,0.4); font-style: italic; }
        .list-container::-webkit-scrollbar { width: 4px; }
        .list-container::-webkit-scrollbar-track { background: transparent; }
        .list-container::-webkit-scrollbar-thumb { background: var(--neon-pink); border-radius: 4px; }
        .rarity-forbidden {
            animation: glitch 0.3s infinite;
            text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000, 0 0 40px #ff0000;
        }
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
        .label-timer { font-size: 12px; color: rgba(255,255,255,0.6); text-transform: uppercase; margin-bottom: 2px; }
    </style>
</head>
<body>
    <div class="particles" id="particlesContainer"></div>
    <div class="game-container">
        <h1>📱 PhoneClicker</h1>
        <p class="status">Test-3A</p>
        <div class="menu-bar">
            <button class="menu-btn active" data-screen="main">🎮 Игра</button>
            <button class="menu-btn" data-screen="inventory">📦 Инвентарь</button>
            <button class="menu-btn" data-screen="achieve">🏆 Ачивки</button>
        </div>
        <div class="screen active" id="screenMain">
            <button class="btn btn-reset" id="resetBtn">🗑 Сбросить</button>
            <div class="phone-display" id="phoneDisplay">
                <span id="phoneEmoji">📦</span>
                <span class="phone-name" id="phoneName">???</span>
                <span class="phone-model" id="phoneModel">Нажми кнопку</span>
            </div>
            <!-- Блок для обычной кнопки -->
            <div class="label-timer">📱 Телефон (базовый)</div>
            <div class="timer" id="timerBasic">00:00</div>
            <button class="btn btn-primary" id="rollBasicBtn">📱 Открыть телефон</button>

            <!-- Блок для кейса -->
            <div style="margin-top: 12px;" class="label-timer">📦 Кейс (редкие+)</div>
            <div class="timer" id="timerCase">00:00</div>
            <button class="btn btn-case" id="rollCaseBtn">📦 Открыть кейс</button>

            <div class="stats-row">
                <div class="stat-box"><div class="stat-value" id="totalOpened">0</div><div class="stat-label">Открыто</div></div>
                <div class="stat-box"><div class="stat-value" id="uniquePhones">0</div><div class="stat-label">Уникальных</div></div>
                <div class="stat-box"><div class="stat-value" id="bestRarity">-</div><div class="stat-label">Лучшая</div></div>
            </div>
        </div>
        <div class="screen" id="screenInventory">
            <div class="list-container" id="inventoryList"><div class="empty-msg">📦 Пока пусто...</div></div>
        </div>
        <div class="screen" id="screenAchieve">
            <div class="list-container" id="achieveList"></div>
        </div>
    </div>
    <script>
    (function() {
        'use strict';
        // Частицы
        const particlesContainer = document.getElementById('particlesContainer');
        for (let i = 0; i < 40; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            const size = Math.random() * 4 + 2;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDuration = Math.random() * 10 + 8 + 's';
            particle.style.animationDelay = Math.random() * 5 + 's';
            particle.style.background = ['#ff2d75','#00d4ff','#b347ea','#39ff14'][Math.floor(Math.random()*4)];
            particlesContainer.appendChild(particle);
        }

        // Телефоны разделены
        const BASIC_PHONES = [ // только обычные
            { name: "iPhone 3GS", emoji: "📱", year: "2009", rarity: "common" },
            { name: "iPhone 4", emoji: "📱", year: "2010", rarity: "common" },
            { name: "Samsung Galaxy S2", emoji: "📱", year: "2011", rarity: "common" },
            { name: "Xiaomi Mi 1", emoji: "📱", year: "2011", rarity: "common" }
        ];
        const CASE_PHONES = [ // редкие и выше
            { name: "iPhone 5s", emoji: "📱", year: "2013", rarity: "rare" },
            { name: "iPhone 6", emoji: "📱", year: "2014", rarity: "rare" },
            { name: "Google Pixel", emoji: "📱", year: "2016", rarity: "rare" },
            { name: "iPhone X", emoji: "📱", year: "2017", rarity: "epic" },
            { name: "iPhone 12", emoji: "📱", year: "2020", rarity: "epic" },
            { name: "Nokia 3310", emoji: "📞", year: "2000", rarity: "legendary" },
            { name: "Motorola Razr V3", emoji: "📟", year: "2004", rarity: "legendary" },
            { name: "iPhone 2G (первый)", emoji: "📱", year: "2007", rarity: "mythic" },
            { name: "Nokia 8110 \"банан\"", emoji: "🍌", year: "1996", rarity: "mythic" },
            { name: "Samsung Galaxy Note 7", emoji: "💥", year: "2016", rarity: "forbidden" }
        ];

        const RARITY = {
            common:    { label: "Обычный",    color: "#39ff14", tier: 1, glow: "0 0 20px #39ff14" },
            rare:      { label: "Редкий",     color: "#00d4ff", tier: 2, glow: "0 0 20px #00d4ff" },
            epic:      { label: "Эпический",  color: "#b347ea", tier: 3, glow: "0 0 25px #b347ea" },
            legendary: { label: "Легендарный", color: "#ffe600", tier: 4, glow: "0 0 30px #ffe600" },
            mythic:    { label: "Мифический", color: "#ff2d75", tier: 5, glow: "0 0 35px #ff2d75" },
            forbidden: { label: "Запрещено",  color: "#dc143c", tier: 6, glow: "0 0 40px #ff0000, 0 0 80px #ff0000" }
        };

        // Шансы для кейса (без обычных)
        const CASE_CHANCES = {
            rare:      46,
            epic:      28,
            legendary: 15,
            mythic:    7,
            forbidden: 4
        };

        const COOLDOWN_BASIC = 20;   // секунд
        const COOLDOWN_CASE = 120;    // 2 минуты

        const ACHIEVEMENTS = [
            { id: "first_roll",   name: "Первый телефон",   desc: "Открыть телефон впервые",        icon: "📱", check: s => s.totalOpened >= 1 },
            { id: "roll_10",      name: "Коллекционер",     desc: "Открыть 10 телефонов",            icon: "📦", check: s => s.totalOpened >= 10 },
            { id: "roll_50",      name: "Фанатик",          desc: "Открыть 50 телефонов",            icon: "🔥", check: s => s.totalOpened >= 50 },
            { id: "first_rare",   name: "Везунчик",         desc: "Найти редкий телефон",            icon: "💎", check: (s, phone) => phone && RARITY[phone.rarity].tier === 2 },
            { id: "first_epic",   name: "Эпическая удача",  desc: "Найти эпический телефон",         icon: "✨", check: (s, phone) => phone && RARITY[phone.rarity].tier === 3 },
            { id: "first_legend", name: "Легенда",          desc: "Найти легендарный телефон",       icon: "👑", check: (s, phone) => phone && RARITY[phone.rarity].tier === 4 },
            { id: "first_mythic", name: "Миф стал реальностью", desc: "Найти мифический телефон",    icon: "🌟", check: (s, phone) => phone && RARITY[phone.rarity].tier === 5 },
            { id: "first_forbidden", name: "Запретный плод", desc: "Найти запрещённый телефон",      icon: "🚫", check: (s, phone) => phone && RARITY[phone.rarity].tier === 6 },
            { id: "all_common",   name: "Базовый набор",    desc: "Собрать все обычные телефоны",    icon: "✅", check: s => s.uniqueByRarity.common >= 4 },
            { id: "all_mythic",   name: "Хранитель мифов",  desc: "Собрать все мифические телефоны", icon: "🏆", check: s => s.uniqueByRarity.mythic >= 2 },
            { id: "all_forbidden", name: "Взрывоопасный",   desc: "Найти Galaxy Note 7",             icon: "⛔", check: s => s.uniqueByRarity.forbidden >= 1 }
        ];

        const SAVE_KEY = 'phoneclicker_save_v3';

        let collection = [], totalOpened = 0, unlockedAchievements = [];
        let timerEndBasic = 0, timerIdBasic = null, buttonLockedBasic = false;
        let timerEndCase = 0, timerIdCase = null, buttonLockedCase = false;
        let uniqueByRarity = { common: 0, rare: 0, epic: 0, legendary: 0, mythic: 0, forbidden: 0 };

        const $ = id => document.getElementById(id);
        const el = {
            phoneDisplay: $('phoneDisplay'), phoneEmoji: $('phoneEmoji'),
            phoneName: $('phoneName'), phoneModel: $('phoneModel'),
            timerBasic: $('timerBasic'), timerCase: $('timerCase'),
            rollBasicBtn: $('rollBasicBtn'), rollCaseBtn: $('rollCaseBtn'),
            totalOpened: $('totalOpened'), uniquePhones: $('uniquePhones'),
            bestRarity: $('bestRarity'), inventoryList: $('inventoryList'),
            achieveList: $('achieveList'),
            screenMain: $('screenMain'), screenInventory: $('screenInventory'),
            screenAchieve: $('screenAchieve'),
            resetBtn: $('resetBtn')
        };

        const fmtTime = s => `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;

        function updateStats() {
            uniqueByRarity = { common: 0, rare: 0, epic: 0, legendary: 0, mythic: 0, forbidden: 0 };
            const seen = {};
            for (const phone of collection) {
                if (!seen[phone.name]) { seen[phone.name] = true; uniqueByRarity[phone.rarity]++; }
            }
            const uniqueCount = Object.keys(seen).length;
            const bestTier = collection.reduce((max, p) => Math.max(max, RARITY[p.rarity].tier), 0);
            el.totalOpened.textContent = totalOpened;
            el.uniquePhones.textContent = uniqueCount;
            const bestKey = Object.keys(RARITY).find(k => RARITY[k].tier === bestTier);
            el.bestRarity.textContent = bestKey ? RARITY[bestKey].label : '-';
            el.bestRarity.style.color = bestKey ? RARITY[bestKey].color : '#888';
        }

        function switchScreen(screen) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
            const screens = { main: el.screenMain, inventory: el.screenInventory, achieve: el.screenAchieve };
            if (screens[screen]) {
                screens[screen].classList.add('active');
                document.querySelector(`.menu-btn[data-screen="${screen}"]`).classList.add('active');
            }
            if (screen === 'inventory') renderInventory();
            if (screen === 'achieve') renderAchievements();
        }

        function renderInventory() {
            if (collection.length === 0) {
                el.inventoryList.innerHTML = '<div class="empty-msg">📦 Пока пусто...</div>'; return;
            }
            const grouped = {};
            for (const phone of collection) {
                if (!grouped[phone.name]) grouped[phone.name] = { phone, count: 0 };
                grouped[phone.name].count++;
            }
            let html = '';
            for (const [name, data] of Object.entries(grouped)) {
                const cfg = RARITY[data.phone.rarity];
                const extraClass = data.phone.rarity === 'forbidden' ? ' rarity-forbidden' : '';
                html += `<div class="inv-item${extraClass}">
                    <span class="inv-icon" style="color:${cfg.color}">${data.phone.emoji}</span>
                    <div class="inv-info">
                        <div class="inv-name">${name}</div>
                        <div style="color:${cfg.color};font-size:12px;">${cfg.label}</div>
                    </div>
                    <span class="inv-count">×${data.count}</span>
                </div>`;
            }
            el.inventoryList.innerHTML = html;
        }

        function checkAchievements(phone) {
            const stats = { totalOpened, bestTier: collection.reduce((max, p) => Math.max(max, RARITY[p.rarity].tier), 0), uniqueByRarity };
            let changed = false;
            for (const ach of ACHIEVEMENTS) {
                if (unlockedAchievements.includes(ach.id)) continue;
                if (ach.check.length > 1 && phone) {
                    if (ach.check(stats, phone)) { unlockedAchievements.push(ach.id); changed = true; }
                } else if (ach.check(stats)) {
                    unlockedAchievements.push(ach.id); changed = true;
                }
            }
            if (changed) { renderAchievements(); save(); }
        }

        function renderAchievements() {
            let html = '';
            for (const ach of ACHIEVEMENTS) {
                const unlocked = unlockedAchievements.includes(ach.id);
                html += `<div class="achieve-item ${unlocked ? 'unlocked' : ''}">
                    <div class="achieve-icon">${ach.icon}</div>
                    <div class="achieve-info">
                        <div class="achieve-name">${unlocked ? ach.name : '???'}</div>
                        <div class="achieve-desc">${unlocked ? ach.desc : 'Продолжай открывать телефоны...'}</div>
                    </div>
                </div>`;
            }
            el.achieveList.innerHTML = html;
        }

        function save() {
            localStorage.setItem(SAVE_KEY, JSON.stringify({
                collection, totalOpened, unlockedAchievements,
                timerEndBasic: buttonLockedBasic ? timerEndBasic : 0,
                timerEndCase: buttonLockedCase ? timerEndCase : 0
            }));
        }

        function load() {
            try {
                const raw = localStorage.getItem(SAVE_KEY);
                if (!raw) return;
                const data = JSON.parse(raw);
                collection = data.collection || [];
                totalOpened = data.totalOpened || 0;
                unlockedAchievements = data.unlockedAchievements || [];
                updateStats();
                renderAchievements();
                if (data.timerEndBasic && data.timerEndBasic > Date.now()) {
                    startTimer('basic', Math.ceil((data.timerEndBasic - Date.now()) / 1000));
                } else {
                    clearTimer('basic');
                }
                if (data.timerEndCase && data.timerEndCase > Date.now()) {
                    startTimer('case', Math.ceil((data.timerEndCase - Date.now()) / 1000));
                } else {
                    clearTimer('case');
                }
            } catch (e) {
                collection = []; totalOpened = 0; unlockedAchievements = [];
            }
        }

        function resetGame() {
            if (!confirm('Точно сбросить весь прогресс?')) return;
            localStorage.removeItem(SAVE_KEY);
            collection = []; totalOpened = 0; unlockedAchievements = [];
            clearTimer('basic'); clearTimer('case');
            el.phoneEmoji.textContent = '📦';
            el.phoneName.textContent = '???';
            el.phoneName.style.color = '#fff';
            el.phoneModel.textContent = 'Нажми кнопку';
            el.phoneModel.style.color = 'rgba(255,255,255,0.7)';
            el.phoneDisplay.style.borderColor = 'transparent';
            el.phoneDisplay.style.boxShadow = 'none';
            updateStats();
            renderInventory();
            renderAchievements();
        }

        function clearTimer(type) {
            if (type === 'basic') {
                if (timerIdBasic) clearInterval(timerIdBasic);
                timerIdBasic = null; buttonLockedBasic = false; timerEndBasic = 0;
                el.rollBasicBtn.disabled = false;
                el.rollBasicBtn.textContent = '📱 Открыть телефон';
                el.timerBasic.textContent = '00:00';
            } else {
                if (timerIdCase) clearInterval(timerIdCase);
                timerIdCase = null; buttonLockedCase = false; timerEndCase = 0;
                el.rollCaseBtn.disabled = false;
                el.rollCaseBtn.textContent = '📦 Открыть кейс';
                el.timerCase.textContent = '00:00';
            }
        }

        function tick(type) {
            if (type === 'basic') {
                const left = Math.max(0, Math.ceil((timerEndBasic - Date.now()) / 1000));
                el.timerBasic.textContent = fmtTime(left);
                if (left <= 0) { clearTimer('basic'); save(); }
            } else {
                const left = Math.max(0, Math.ceil((timerEndCase - Date.now()) / 1000));
                el.timerCase.textContent = fmtTime(left);
                if (left <= 0) { clearTimer('case'); save(); }
            }
        }

        function startTimer(type, seconds) {
            if (type === 'basic') {
                if (timerIdBasic) clearInterval(timerIdBasic);
                timerEndBasic = Date.now() + seconds * 1000;
                buttonLockedBasic = true; el.rollBasicBtn.disabled = true;
                el.rollBasicBtn.textContent = '⏳ Ожидание...';
                tick('basic');
                timerIdBasic = setInterval(() => tick('basic'), 500);
            } else {
                if (timerIdCase) clearInterval(timerIdCase);
                timerEndCase = Date.now() + seconds * 1000;
                buttonLockedCase = true; el.rollCaseBtn.disabled = true;
                el.rollCaseBtn.textContent = '⏳ Ожидание...';
                tick('case');
                timerIdCase = setInterval(() => tick('case'), 500);
            }
            save();
        }

        function applyPhoneDisplay(phone) {
            const cfg = RARITY[phone.rarity];
            el.phoneEmoji.textContent = phone.emoji;
            el.phoneEmoji.style.color = cfg.color;
            el.phoneName.textContent = phone.name;
            el.phoneName.style.color = cfg.color;
            el.phoneModel.textContent = `${cfg.label} • ${phone.year}`;
            el.phoneModel.style.color = cfg.color;
            el.phoneDisplay.style.borderColor = cfg.color;
            el.phoneDisplay.style.boxShadow = cfg.glow;

            if (phone.rarity === 'forbidden') {
                el.phoneName.classList.add('rarity-forbidden');
                el.phoneModel.classList.add('rarity-forbidden');
            } else {
                el.phoneName.classList.remove('rarity-forbidden');
                el.phoneModel.classList.remove('rarity-forbidden');
            }

            el.phoneEmoji.style.animation = 'none';
            void el.phoneEmoji.offsetWidth;
            el.phoneEmoji.style.animation = 'bounceIn 0.5s';
        }

        function rollBasicPhone() {
            if (buttonLockedBasic) return;
            const randomIndex = Math.floor(Math.random() * BASIC_PHONES.length);
            const phone = BASIC_PHONES[randomIndex];
            applyPhoneDisplay(phone);
            collection.push(phone);
            totalOpened++;
            updateStats();
            checkAchievements(phone);
            save();
            startTimer('basic', COOLDOWN_BASIC);
        }

        function rollCasePhone() {
            if (buttonLockedCase) return;
            const roll = Math.random() * 100;
            let rarity = 'rare';
            let cumulative = 0;
            for (const key of ['rare', 'epic', 'legendary', 'mythic', 'forbidden']) {
                cumulative += CASE_CHANCES[key];
                if (roll < cumulative) { rarity = key; break; }
            }
            const pool = CASE_PHONES.filter(p => p.rarity === rarity);
            const phone = pool[Math.floor(Math.random() * pool.length)];
            applyPhoneDisplay(phone);
            collection.push(phone);
            totalOpened++;
            updateStats();
            checkAchievements(phone);
            save();
            startTimer('case', COOLDOWN_CASE);
        }

        // Обработчики
        el.rollBasicBtn.addEventListener('click', rollBasicPhone);
        el.rollCaseBtn.addEventListener('click', rollCasePhone);
        el.resetBtn.addEventListener('click', resetGame);
        document.querySelectorAll('.menu-btn').forEach(btn => {
            btn.addEventListener('click', () => switchScreen(btn.dataset.screen));
        });

        renderAchievements();
        load();
        updateStats();
    })();
    </script>
</body>
</html>
