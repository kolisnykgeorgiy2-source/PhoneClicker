<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PhoneClicker Test-0E</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>📱</text></svg>">
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            padding: 16px;
            color: #eee;
            text-align: center;
            -webkit-user-select: none;
            user-select: none;
        }
        .game-container {
            background: #16213e;
            padding: 24px 20px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
        }
        h1 {
            font-size: 26px;
            margin-bottom: 4px;
        }
        .status {
            font-size: 13px;
            color: #888;
            margin-bottom: 16px;
        }
        .phone-display {
            font-size: 70px;
            margin-bottom: 16px;
            background: #0f3460;
            border-radius: 20px;
            padding: 20px 16px;
            min-height: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px solid #e94560;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .phone-name {
            font-size: 26px;
            font-weight: bold;
            margin-top: 8px;
            color: #e94560;
            word-break: break-word;
        }
        .phone-model {
            font-size: 15px;
            color: #aaa;
        }
        .timer {
            font-size: 38px;
            font-weight: bold;
            color: #f5c542;
            margin: 16px 0;
            background: #0f3460;
            padding: 16px;
            border-radius: 16px;
            letter-spacing: 3px;
            font-variant-numeric: tabular-nums;
        }
        button {
            background: #e94560;
            border: none;
            color: white;
            font-size: 20px;
            font-weight: bold;
            padding: 18px 24px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 0 #a82d44;
            width: 100%;
            margin: 8px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
            touch-action: manipulation;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        button:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #a82d44;
        }
        button:disabled {
            background: #555;
            box-shadow: 0 6px 0 #333;
            cursor: not-allowed;
            transform: none;
            color: #999;
        }
        .btn-reset {
            background: #333;
            box-shadow: 0 4px 0 #111;
            font-size: 14px;
            padding: 8px 16px;
            margin-bottom: 12px;
        }
        .collection {
            margin-top: 20px;
            text-align: left;
            background: #0a0e1a;
            padding: 16px;
            border-radius: 16px;
            max-height: 220px;
            overflow-y: auto;
        }
        .collection h3 {
            margin-bottom: 12px;
            color: #e94560;
            font-size: 16px;
        }
        .collection-item {
            padding: 10px 0;
            border-bottom: 1px solid #333;
            font-size: 15px;
            color: #ccc;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .collection-item:last-child {
            border-bottom: none;
        }
        .collection-empty {
            color: #666;
            font-size: 14px;
            text-align: center;
            display: block;
            padding: 10px 0;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>📱 PhoneClicker</h1>
        <p class="status">Test-0E</p>
        <button class="btn-reset" onclick="resetGame()">🗑 Сбросить прогресс</button>

        <div class="phone-display" id="phoneDisplay">
            <span id="phoneEmoji">📦</span>
            <span class="phone-name" id="phoneName">???</span>
            <span class="phone-model" id="phoneModel">Нажми кнопку</span>
        </div>

        <div class="timer" id="timerDisplay">00:00</div>

        <button id="rollButton" onclick="rollPhone()">🎲 Открыть телефон</button>

        <div class="collection">
            <h3>📋 Коллекция</h3>
            <div id="collectionList"><span class="collection-empty">Пока пусто...</span></div>
        </div>
    </div>

    <script>
    (function() {
        'use strict';

        // ─── ДАННЫЕ ────────────────────────────
        const PHONES = [
            { name: "iPhone 3GS", emoji: "📱", year: "2009", rarity: "common" },
            { name: "iPhone 4", emoji: "📱", year: "2010", rarity: "common" },
            { name: "Samsung Galaxy S2", emoji: "📱", year: "2011", rarity: "common" },
            { name: "Xiaomi Mi 1", emoji: "📱", year: "2011", rarity: "common" },
            { name: "iPhone 5s", emoji: "📱", year: "2013", rarity: "rare" },
            { name: "iPhone 6", emoji: "📱", year: "2014", rarity: "rare" },
            { name: "Google Pixel", emoji: "📱", year: "2016", rarity: "rare" },
            { name: "iPhone X", emoji: "📱", year: "2017", rarity: "epic" },
            { name: "iPhone 12", emoji: "📱", year: "2020", rarity: "epic" },
            { name: "Nokia 3310", emoji: "📞", year: "2000", rarity: "legendary" },
            { name: "Motorola Razr V3", emoji: "📟", year: "2004", rarity: "legendary" },
            { name: "iPhone 2G (первый)", emoji: "📱", year: "2007", rarity: "mythic" },
            { name: "Nokia 8110 \"банан\"", emoji: "🍌", year: "1996", rarity: "mythic" }
        ];

        const RARITY = {
            common:    { label: "Обычный",    color: "#4ade80", chance: 45, glow: "0 0 10px #4ade80" },
            rare:      { label: "Редкий",     color: "#60a5fa", chance: 30, glow: "0 0 10px #60a5fa" },
            epic:      { label: "Эпический",  color: "#c084fc", chance: 15, glow: "0 0 15px #c084fc" },
            legendary: { label: "Легендарный", color: "#fbbf24", chance: 8,  glow: "0 0 20px #fbbf24" },
            mythic:    { label: "Мифический", color: "#f87171", chance: 2,  glow: "0 0 25px #f87171" }
        };

        const COOLDOWN = 20; // секунд для теста
        const SAVE_KEY = 'phoneclicker_save';

        // ─── СОСТОЯНИЕ ─────────────────────────
        let collection = [];
        let timerEnd = 0;
        let timerId = null;
        let buttonLocked = false;

        // ─── DOM-ЭЛЕМЕНТЫ ────────────────────
        const $ = (id) => document.getElementById(id);
        const el = {
            phoneDisplay: $('phoneDisplay'),
            phoneEmoji:   $('phoneEmoji'),
            phoneName:    $('phoneName'),
            phoneModel:   $('phoneModel'),
            timerDisplay: $('timerDisplay'),
            rollButton:   $('rollButton'),
            collectionList: $('collectionList')
        };

        // ─── УТИЛИТЫ ──────────────────────────
        const fmtTime = (s) => {
            const m = Math.floor(s / 60);
            const sec = s % 60;
            return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
        };

        // ─── СОХРАНЕНИЕ ────────────────────────
        function save() {
            const data = {
                collection: collection,
                timerEnd: buttonLocked ? timerEnd : 0
            };
            localStorage.setItem(SAVE_KEY, JSON.stringify(data));
        }

        function load() {
            try {
                const raw = localStorage.getItem(SAVE_KEY);
                if (!raw) return;
                const data = JSON.parse(raw);
                collection = data.collection || [];
                renderCollection();
                if (data.timerEnd && data.timerEnd > Date.now()) {
                    startTimer(Math.ceil((data.timerEnd - Date.now()) / 1000));
                }
            } catch (e) {
                collection = [];
            }
        }

        function resetGame() {
            if (!confirm('Точно сбросить весь прогресс?')) return;
            localStorage.removeItem(SAVE_KEY);
            collection = [];
            clearTimer();
            el.phoneEmoji.textContent = '📦';
            el.phoneName.textContent = '???';
            el.phoneName.style.color = '#e94560';
            el.phoneModel.textContent = 'Нажми кнопку';
            el.phoneModel.style.color = '#aaa';
            el.phoneDisplay.style.borderColor = '#e94560';
            el.phoneDisplay.style.boxShadow = 'none';
            renderCollection();
        }

        // ─── ТАЙМЕР ────────────────────────────
        function clearTimer() {
            if (timerId) clearInterval(timerId);
            timerId = null;
            buttonLocked = false;
            timerEnd = 0;
            el.rollButton.disabled = false;
            el.rollButton.textContent = '🎲 Открыть телефон';
            el.timerDisplay.textContent = '00:00';
        }

        function tick() {
            const left = Math.max(0, Math.ceil((timerEnd - Date.now()) / 1000));
            el.timerDisplay.textContent = fmtTime(left);
            if (left <= 0) {
                clearTimer();
                save();
            }
        }

        function startTimer(seconds) {
            if (timerId) clearInterval(timerId);
            timerEnd = Date.now() + seconds * 1000;
            buttonLocked = true;
            el.rollButton.disabled = true;
            el.rollButton.textContent = '⏳ Ожидание...';
            tick();
            timerId = setInterval(tick, 500); // обновляем 2 раза в секунду (экономия батареи)
            save();
        }

        // ─── РОЛЛ ТЕЛЕФОНА ────────────────────
        window.rollPhone = function() {
            if (buttonLocked) return;

            // Определяем редкость
            let roll = Math.random() * 100;
            let rarity = 'common';
            let cumulative = 0;
            for (const [key, cfg] of Object.entries(RARITY)) {
                cumulative += cfg.chance;
                if (roll <= cumulative) { rarity = key; break; }
            }

            // Выбираем телефон
            const pool = PHONES.filter(p => p.rarity === rarity);
            const phone = pool[Math.floor(Math.random() * pool.length)];
            const cfg = RARITY[phone.rarity];

            // Отображаем
            el.phoneEmoji.textContent = phone.emoji;
            el.phoneName.textContent = phone.name;
            el.phoneName.style.color = cfg.color;
            el.phoneModel.textContent = `${cfg.label} • ${phone.year}`;
            el.phoneModel.style.color = cfg.color;
            el.phoneDisplay.style.borderColor = cfg.color;
            el.phoneDisplay.style.boxShadow = cfg.glow;

            // Сохраняем
            collection.push(phone);
            renderCollection();
            save();
            startTimer(COOLDOWN);
        };

        // ─── КОЛЛЕКЦИЯ ─────────────────────────
        function renderCollection() {
            if (collection.length === 0) {
                el.collectionList.innerHTML = '<span class="collection-empty">Пока пусто...</span>';
                return;
            }
            let html = '';
            for (const phone of collection) {
                const cfg = RARITY[phone.rarity];
                html += `<div class="collection-item">
                    <span>${phone.emoji}</span>
                    <span>${phone.name} (${phone.year})</span>
                    <span style="color:${cfg.color};margin-left:auto;font-size:12px;">${cfg.label}</span>
                </div>`;
            }
            el.collectionList.innerHTML = html;
            el.collectionList.scrollTop = el.collectionList.scrollHeight;
        }

        // ─── СБРОС (ГЛОБАЛЬНО) ──────────────────
        window.resetGame = resetGame;

        // ─── ЗАПУСК ────────────────────────────
        load();
    })();
    </script>
</body>
</html>
