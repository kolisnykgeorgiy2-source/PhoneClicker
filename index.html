<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PhoneClicker Test</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            margin: 0;
            padding: 16px;
            color: #eee;
            text-align: center;
            -webkit-user-select: none;
            user-select: none;
        }
        .game-container {
            background: #16213e;
            padding: 24px 20px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
        }
        h1 {
            font-size: 26px;
            margin: 0 0 4px;
        }
        .status {
            font-size: 13px;
            color: #888;
            margin: 0 0 16px;
        }
        .phone-display {
            font-size: 70px;
            margin: 0 0 16px;
            background: #0f3460;
            border-radius: 20px;
            padding: 20px 16px;
            min-height: 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px solid #e94560;
            transition: 0.3s;
        }
        .phone-name {
            font-size: 26px;
            font-weight: bold;
            margin-top: 8px;
            color: #e94560;
            word-break: break-word;
        }
        .phone-model {
            font-size: 15px;
            color: #aaa;
        }
        .timer {
            font-size: 38px;
            font-weight: bold;
            color: #f5c542;
            margin: 16px 0;
            background: #0f3460;
            padding: 16px;
            border-radius: 16px;
            letter-spacing: 3px;
        }
        button {
            background: #e94560;
            border: none;
            color: white;
            font-size: 20px;
            font-weight: bold;
            padding: 18px 24px;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.15s;
            box-shadow: 0 6px 0 #a82d44;
            width: 100%;
            margin: 8px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
            touch-action: manipulation;
        }
        button:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #a82d44;
        }
        button:disabled {
            background: #555;
            box-shadow: 0 6px 0 #333;
            cursor: not-allowed;
            transform: none;
            color: #999;
        }
        .collection {
            margin-top: 20px;
            text-align: left;
            background: #0a0e1a;
            padding: 16px;
            border-radius: 16px;
            max-height: 220px;
            overflow-y: auto;
        }
        .collection h3 {
            margin: 0 0 12px;
            color: #e94560;
            font-size: 16px;
        }
        .collection-item {
            padding: 10px 0;
            border-bottom: 1px solid #333;
            font-size: 15px;
            color: #ccc;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .collection-item:last-child {
            border-bottom: none;
        }
        .collection-empty {
            color: #666;
            font-size: 14px;
            text-align: center;
            padding: 10px 0;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>📱 PhoneClicker</h1>
        <p class="status">test-0A</p>
        
        <div class="phone-display" id="phoneDisplay">
            <span id="phoneEmoji">📦</span>
            <span class="phone-name" id="phoneName">???</span>
            <span class="phone-model" id="phoneModel">Нажми кнопку</span>
        </div>

        <div class="timer" id="timerDisplay">00:00</div>

        <button id="rollButton" onclick="rollPhone()">🎲 Открыть телефон</button>

        <div class="collection">
            <h3>📋 Коллекция</h3>
            <div id="collectionList"><span class="collection-empty">Пока пусто...</span></div>
        </div>
    </div>

<script>
    // База телефонов с редкостью
    const phones = [
        // Обычные (Common) - 45%
        { name: "iPhone 3GS", emoji: "📱", modelYear: "2009", rarity: "common" },
        { name: "iPhone 4", emoji: "📱", modelYear: "2010", rarity: "common" },
        { name: "Samsung Galaxy S2", emoji: "📱", modelYear: "2011", rarity: "common" },
        { name: "Xiaomi Mi 1", emoji: "📱", modelYear: "2011", rarity: "common" },
        // Редкие (Rare) - 30%
        { name: "iPhone 5s", emoji: "📱", modelYear: "2013", rarity: "rare" },
        { name: "iPhone 6", emoji: "📱", modelYear: "2014", rarity: "rare" },
        { name: "Google Pixel", emoji: "📱", modelYear: "2016", rarity: "rare" },
        // Эпические (Epic) - 15%
        { name: "iPhone X", emoji: "📱", modelYear: "2017", rarity: "epic" },
        { name: "iPhone 12", emoji: "📱", modelYear: "2020", rarity: "epic" },
        // Легендарные (Legendary) - 8%
        { name: "Nokia 3310", emoji: "📞", modelYear: "2000", rarity: "legendary" },
        { name: "Motorola Razr V3", emoji: "📟", modelYear: "2004", rarity: "legendary" },
        // Мифические (Mythic) - 2%
        { name: "iPhone 2G (первый)", emoji: "📱", modelYear: "2007", rarity: "mythic" },
        { name: "Nokia 8110 \"банан\"", emoji: "🍌", modelYear: "1996", rarity: "mythic" }
    ];

    // Настройки редкости
    const rarityConfig = {
        common:    { label: "Обычный",  color: "#4ade80", chance: 45, glow: "0 0 10px #4ade80" },
        rare:      { label: "Редкий",   color: "#60a5fa", chance: 30, glow: "0 0 10px #60a5fa" },
        epic:      { label: "Эпический", color: "#c084fc", chance: 15, glow: "0 0 15px #c084fc" },
        legendary: { label: "Легендарный", color: "#fbbf24", chance: 8, glow: "0 0 20px #fbbf24" },
        mythic:    { label: "Мифический", color: "#f87171", chance: 2, glow: "0 0 25px #f87171" }
    };

    // Загрузка сохранённых данных
    let collectedPhones = [];
    let timerActive = false;
    let timerSeconds = 0;
    let timerInterval = null;
    let timerEndTime = 0; // Время окончания таймера (timestamp)
    const targetSeconds = 20; // Для теста

    // Ключ для localStorage
    const SAVE_KEY = 'phoneclicker_save';

    // Элементы DOM
    const phoneEmojiEl = document.getElementById('phoneEmoji');
    const phoneNameEl = document.getElementById('phoneName');
    const phoneModelEl = document.getElementById('phoneModel');
    const timerDisplayEl = document.getElementById('timerDisplay');
    const rollButton = document.getElementById('rollButton');
    const collectionListEl = document.getElementById('collectionList');
    const phoneDisplay = document.getElementById('phoneDisplay');

    // Сохранение в localStorage
    function saveGame() {
        const saveData = {
            collectedPhones: collectedPhones,
            timerEndTime: timerActive ? timerEndTime : 0,
            savedAt: Date.now()
        };
        localStorage.setItem(SAVE_KEY, JSON.stringify(saveData));
    }

    // Загрузка из localStorage
    function loadGame() {
        const saved = localStorage.getItem(SAVE_KEY);
        if (saved) {
            try {
                const saveData = JSON.parse(saved);
                collectedPhones = saveData.collectedPhones || [];
                
                // Восстановление таймера
                if (saveData.timerEndTime && saveData.timerEndTime > Date.now()) {
                    const remainingSeconds = Math.ceil((saveData.timerEndTime - Date.now()) / 1000);
                    startTimer(remainingSeconds);
                }
                
                updateCollection();
            } catch (e) {
                console.log('Ошибка загрузки сохранения');
                collectedPhones = [];
            }
        }
    }

    // Сброс сохранения
    function resetGame() {
        if (confirm('Точно сбросить весь прогресс? Это нельзя отменить.')) {
            localStorage.removeItem(SAVE_KEY);
            collectedPhones = [];
            if (timerInterval) clearInterval(timerInterval);
            timerActive = false;
            timerSeconds = 0;
            timerEndTime = 0;
            rollButton.disabled = false;
            rollButton.textContent = '🎲 Открыть телефон';
            timerDisplayEl.textContent = '00:00';
            phoneEmojiEl.textContent = '📦';
            phoneNameEl.textContent = '???';
            phoneNameEl.style.color = '#e94560';
            phoneModelEl.textContent = 'Нажми кнопку';
            phoneModelEl.style.color = '#aaa';
            phoneDisplay.style.borderColor = '#e94560';
            phoneDisplay.style.boxShadow = 'none';
            updateCollection();
        }
    }

    function formatTime(seconds) {
        const mins = Math.floor(seconds / 60);
        const secs = seconds % 60;
        return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }

    function updateTimerDisplay() {
        timerDisplayEl.textContent = formatTime(timerSeconds);
        if (timerSeconds <= 0) {
            clearInterval(timerInterval);
            timerActive = false;
            timerEndTime = 0;
            rollButton.disabled = false;
            rollButton.textContent = '🎲 Открыть телефон';
            timerDisplayEl.textContent = '00:00';
            saveGame();
        }
    }

    function startTimer(durationSeconds) {
        if (timerInterval) clearInterval(timerInterval);
        
        timerSeconds = durationSeconds;
        timerEndTime = Date.now() + (durationSeconds * 1000);
        timerActive = true;
        rollButton.disabled = true;
        rollButton.textContent = '⏳ Ожидание...';
        updateTimerDisplay();
        saveGame();

        timerInterval = setInterval(() => {
            timerSeconds--;
            updateTimerDisplay();
        }, 1000);
    }

    // Выбор телефона с учётом редкости
    function rollPhone() {
        if (timerActive) return;

        const roll = Math.random() * 100;
        let selectedRarity = 'common';
        let cumulative = 0;

        for (const [rarity, config] of Object.entries(rarityConfig)) {
            cumulative += config.chance;
            if (roll <= cumulative) {
                selectedRarity = rarity;
                break;
            }
        }

        const phonesOfRarity = phones.filter(p => p.rarity === selectedRarity);
        const randomIndex = Math.floor(Math.random() * phonesOfRarity.length);
        const rolledPhone = phonesOfRarity[randomIndex];
        const rarityInfo = rarityConfig[rolledPhone.rarity];

        phoneEmojiEl.textContent = rolledPhone.emoji;
        phoneNameEl.textContent = rolledPhone.name;
        phoneNameEl.style.color = rarityInfo.color;
        phoneModelEl.textContent = `${rarityInfo.label} • ${rolledPhone.modelYear}`;
        phoneModelEl.style.color = rarityInfo.color;
        phoneDisplay.style.borderColor = rarityInfo.color;
        phoneDisplay.style.boxShadow = rarityInfo.glow;

        collectedPhones.push(rolledPhone);
        updateCollection();
        saveGame();
        startTimer(targetSeconds);
    }

    function updateCollection() {
        if (collectedPhones.length === 0) {
            collectionListEl.innerHTML = '<span class="collection-empty">Пока пусто...</span>';
            return;
        }

        let html = '';
        collectedPhones.forEach((phone, index) => {
            const rarityInfo = rarityConfig[phone.rarity];
            html += `
                <div class="collection-item">
                    <span>${phone.emoji}</span>
                    <span>${phone.name} (${phone.modelYear})</span>
                    <span style="color: ${rarityInfo.color}; margin-left: auto; font-size: 12px;">${rarityInfo.label}</span>
                </div>
            `;
        });
        collectionListEl.innerHTML = html;
        collectionListEl.scrollTop = collectionListEl.scrollHeight;
        saveGame();
    }

    // Загрузка сохранения при старте
    loadGame();
</script>
</body>
</html>
