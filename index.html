  <!DOCTYPE html>
  <html lang="ru">
  <head>
  <meta charset="UTF-8">
  <title>Телефон‑кликер (минималка)</title>
  <style>
    :root{
      --bg:#1e1e2f;
      --panel:#2a2a40;
      --text:#e0e0ff;
      --common:#8bc34a;
      --uncommon:#4fc3f7;
      --rare:#9575cd;
      --epic:#ff9800;
      --legendary:#ff5252;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:Arial,Helvetica,sans-serif;
      background:var(--bg);
      color:var(--text);
      display:flex;
      flex-direction:column;
      align-items:center;
      min-height:100vh;
      padding:20px
    }
    h1{margin-bottom:1rem}
    #game{
      background:var(--panel);
      border-radius:12px;
      padding:20px;
      width:100%;max-width:420px
    }
    #clickBtn{
      font-size:1.5rem;
      padding:12px 24px;
      cursor:pointer;
      background:#4caf50;
      border:none;
      border-radius:6px;
      color:#fff;
      transition:background .2s
    }
    #clickBtn:hover{background:#45a049}
    #clickBtn:active{transform:scale(.97)}
    #dropZone{
      margin-top:20px;
      min-height:120px;
      text-align:center;
      font-size:1.2rem;
      color:#aaa
    }
    .card{
      display:inline-block;
      margin:8px;
      width:70px;height:110px;
      border-radius:8px;
      overflow:hidden;
      transition:transform .2s;
      border:3px solid transparent
    }
    .card img{width:100%;height:100%;object-fit:cover}
    .common   {border-color:var(--common)}
    .uncommon {border-color:var(--uncommon)}
    .rare     {border-color:var(--rare)}
    .epic     {border-color:var(--epic)}
    .legendary{border-color:var(--legendary)}
    .stats{display:flex;justify-content:space-between;margin-top:1rem;font-size:.9rem}
    #inventory{margin-top:1.5rem;display:flex;flex-wrap:wrap;justify-content:center}
    .achievements{margin-top:1.5rem;max-height:150px;overflow-y:auto}
    .ach{border-top:1px solid #444;padding:4px 0;font-size:.85rem;color:#bbb}
    .ach.earned{color:var(--common)}
    #toast{
      position:fixed;bottom:20px;right:20px;
      background:#333;color:#fff;padding:10px 18px;
      border-radius:6px;opacity:0;transform:translateY(20px);
      transition:opacity .3s,transform .3s
    }
    #toast.show{opacity:1;transform:translateY(0)}
  </style>
  </head>
  <body>
  <h1>Телефон‑кликер</h1>
  <div id="game">
    <button id="clickBtn">📱 Нажать кнопку</button>
    <div id="dropZone">Здесь появятся карточки</div>
    <div class="stats">
      <span>Монеты: <span id="coinCount">0</span></span>
      <span>Кликов: <span id="clickCount">0</span></span>
    </div>
    <div id="inventory"></div>
    <div class="achievements" id="achList"></div>
  </div>
  <div id="toast"></div>

  <script>
  /* ---------- Данные ---------- */
  const phones = [
    {name:"iPhone 4",   rarity:"common",  coins:10, weight:60, color:"#8bc34a"},
    {name:"iPhone 5S",  rarity:"common",  coins:12, weight:55, color:"#8bc34a"},
    {name:"Galaxy S3",  rarity:"uncommon",coins:20, weight:20, color:"#4fc3f7"},
    {name:"Pixel 2",    rarity:"uncommon",coins:22, weight:15, color:"#4fc3f7"},
    {name:"iPhone X",   rarity:"rare",    coins:40, weight:8,  color:"#9575cd"},
    {name:"Galaxy Note10",rarity:"rare",coins:45,weight:6, color:"#9575cd"},
    {name:"iPhone 12 Pro",rarity:"epic", coins:70, weight:3, color:"#ff9800"},
    {name:"Galaxy S21 Ultra",rarity:"epic",coins:75,weight:2,color:"#ff9800"},
    {name:"iPhone 14 Pro Max",rarity:"legendary",coins:150,weight:1,color:"#ff5252"},
    {name:"Galaxy Z Fold 4",rarity:"legendary",coins:160,weight:1,color:"#ff5252"}
  ];

  const achievements = [
    {id:"firstClick",   desc:"Сделать первый клик",          threshold:1,   type:"clicks"},
    {id:"click100",     desc:"Сделать 100 кликов",          threshold:100, type:"clicks"},
    {id:"click1000",    desc:"Сделать 1000 кликов",         threshold:1000,type:"clicks"},
    {id:"collectCommon",desc:"Собрать 5 обычных телефонов", threshold:5,   type:"common"},
    {id:"collectRare",  desc:"Получить первый редкий телефон",threshold:1,type:"rare"},
    {id:"collectLegend",desc:"Получить первый легендарный телефон",threshold:1,type:"legendary"}
  ];

  /* ---------- Состояние ---------- */
  let state = {
    coins:0,
    clicks:0,
    inventory:{},   // name → count
    earned:{},      // achievementId → true
    cooldownSec:3   // пауза между кликами (секунды)
  };

  /* ---------- Хранилище ---------- */
  function saveState(){ try{localStorage.setItem('phoneClicker_mini',JSON.stringify(state));}catch(e){} }
  function loadState(){
    const s = localStorage.getItem('phoneClicker_mini');
    if(s){ try{ state = JSON.parse(s); }catch(e){} }
  }

  /* ---------- Вспомогательные ---------- */
  function randPhone(){
    const r = Math.random()*100;
    let sum=0;
    for(const p of phones){
      sum+=p.weight;
      if(r<sum) return p;
    }
    return phones[phones.length-1];
  }
  function addCoin(n){ state.coins+=n; document.getElementById('coinCount').textContent=state.coins; saveState(); }
  function addClick(){
    state.clicks = state.clicks+1;
    document.getElementById('clickCount').textContent=state.clicks;
    checkAchievements('clicks',state.clicks);
    saveState();
  }
  function addToInventory(name){
    state.inventory[name] = (state.inventory[name]||0)+1;
    renderInventory();
    checkAchievements(getRarity(name), state.inventory[name]);
    saveState();
  }
  function getRarity(name){ return phones.find(p=>p.name===name).rarity; }
  function showToast(msg,type='info'){
    const t=document.getElementById('toast');
    t.textContent=msg;
    t.className='';
    t.classList.add(type,'show');
    setTimeout(()=>t.classList.remove('show'),2000);
  }
  function renderInventory(){
    const cont=document.getElementById('inventory');
    cont.innerHTML='';
    for(const [name,cnt] of Object.entries(state.inventory)){
      const p=phones.find(ph=>ph.name===name);
      const div=document.createElement('div');
      div.className=`card ${p.rarity}`;
      div.dataset.name=name;
      // простой цветной квадрат вместо картинки
      div.style.background = p.color;
      div.title = name;
      cont.appendChild(div);
    }
  }
  function renderAchievements(){
    const list=document.getElementById('achList');
    list.innerHTML='';
    achievements.forEach(ach=>{
      const div=document.createElement('div');
      div.className=`ach ${state.earned[ach.id]?'earned':''}`;
      div.textContent=`${ach.desc} ${state.earned[ach.id]?'✔️':'❌'}`;
      list.appendChild(div);
    });
  }
  function checkAchievements(type,value){
    achievements.forEach(ach=>{
      if(state.earned[ach.id]) return;
      if(ach.type===type && value>=ach.threshold){
        state.earned[ach.id]=true;
        showToast(`Достижение получено: ${ach.desc}`,'success');
      }
    });
    renderAchievements();
  }

  /* ---------- Кулдаун ---------- */
  let cdTimer = null;
  function startCooldown(){
    const btn=document.getElementById('clickBtn');
    btn.disabled=true;
    let remaining=state.cooldownSec;
    btn.textContent=`Нажмите через ${remaining}с`;
    cdTimer=setInterval(()=>{
      remaining--;
      if(remaining>0){
        btn.textContent=`Нажмите через ${remaining}с`;
      }else{
        clearInterval(cdTimer);
        cdTimer=null;
        btn.disabled=false;
        btn.textContent='📱 Нажать кнопку';
      }
    },1000);
  }

  /* ---------- Обработчик клика ---------- */
  document.getElementById('clickBtn').addEventListener('click',()=>{
    // 1️⃣блокируем и запускаем таймер
    startCooldown();

    // 2️⃣считаем клик и начисляем монеты
    addClick();
    const phone = randPhone();
    addCoin(phone.coins);
    addToInventory(phone.name);

    // 3️⃣визуальный вывод «карточки»
    const zone=document.getElementById('dropZone');
    zone.textContent='';
    const card=document.createElement('div');
    card.className=`card ${phone.rarity}`;
    card.dataset.name=phone.name;
    card.style.background = phone.color; // цвет вместо картинки
    zone.appendChild(card);
    // анимация появления
    requestAnimationFrame(()=>{
      card.style.opacity='0';
      card.style.transform='scale(.8)';
      setTimeout(()=>{
        card.style.transition='opacity .3s, transform .3s';
        card.style.opacity='1';
        card.style.transform='scale(1)';
      },10);
    });
    // кратко покажем название
    setTimeout(()=>{zone.textContent=`Выпал: ${phone.name}`;},500);
  });

  /* ---------- Инициализация ---------- */
  loadState();
  renderInventory();
  renderAchievements();
  document.getElementById('coinCount').textContent=state.coins;
  document.getElementById('clickCount').textContent=state.clicks;
  if(state.clicks===0){
    showToast('Добро пожаловать! Нажмите кнопку – после каждого выпадения будет небольшая пауза.','info');
  }
  console.log('🎮 Игра инициализирована. Откройте консоль (F12) для отладки.');
  </script>
  </body>
  </html>
