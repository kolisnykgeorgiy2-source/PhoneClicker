<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width_DIGIT-al, initial-scale=1.0">
    <title>PhoneClicker</title>
    <style>
        :root {
            --bg: #0a0a0a; --surface: #111; --surface-2: #1a1a1a; --border: #252525;
            --text: #e5e5e5; --text-sec: #666;
            --c-common: #8b8b8b; --c-rare: #5b8fb9; --c-epic: #8b5cf6; --c-legendary: #c8a215;
            --c-platinum: #b0b0b0; --c-mythic: #c084fc; --c-forbidden: #ef4444;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg); color: var(--text);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; min-height: 100dvh;
            padding: 16px; -webkit-user-select: none; user-select: none;
        }
        .c { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 24px; width: 100%; max-width: 400px; }
        h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; text-align: center; }
        .sub { text-align: center; font-size: 11px; color: var(--text-sec); margin-bottom: 20px; letter-spacing: 1px; }
        .bal { text-align: center; font-size: 24px; font-weight: 700; margin-bottom: 20px; padding: 10px; background: var(--surface-2); border-radius: 6px; }
        .menu { display: flex; gap: 4px; margin-bottom: 20px; background: var(--surface-2); border-radius: 6px; padding: 4px; }
        .mb { flex: 1; padding: 10px 4px; border: none; background: transparent; color: var(--text-sec); font-size: 12px; font-weight: 500; border-radius: 4px; cursor: pointer; transition: 0.2s; }
        .mb.on { background: var(--text); color: var(--bg); font-weight: 600; }
        .sc { display: none; animation: fi 0.2s ease; } .sc.on { display: block; }
        @keyframes fi { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .tr { display: flex; gap: 8px; margin-bottom: 16px; }
        .bs { flex: 1; padding: 10px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 6px; color: var(--text-sec); font-size: 12px; font-weight: 500; cursor: pointer; text-align: center; }
        .bs:active { background: var(--border); }
        .disp { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 24px 16px; margin-bottom: 16px; text-align: center; }
        .di { width: 180px; height: 180px; object-fit: contain; display: block; margin: 0 auto 12px; animation: p 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes p { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .dn { font-size: 20px; font-weight: 600; display: block; margin-bottom: 2px; }
        .ds { font-size: 13px; color: var(--text-sec); display: block; margin-bottom: 0; }
        .tw { margin-bottom: 16px; text-align: center; }
        .tl { font-size: 11px; color: var(--text-sec); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
        .tm { font-size: 24px; font-weight: 700; letter-spacing: 2px; padding: 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; text-align: center; font-variant-numeric: tabular-nums; }
        .bm { width: 100%; padding: 14px; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.15s; background: var(--text); color: var(--bg); }
        .bm:active { opacity: 0.8; }
        .bm:disabled { background: var(--surface-2); color: var(--text-sec); cursor: not-allowed; }
        .sr { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 16px; }
        .sb { background: var(--surface-2); border-radius: 6px; padding: 10px 0; text-align: center; }
        .sv { font-size: 18px; font-weight: 700; display: block; }
        .sl { font-size: 9px; color: var(--text-sec); text-transform: uppercase; display: block; margin-top: 2px; }
        .ih { display: flex; gap: 0; margin-bottom: 12px; background: var(--surface-2); border-radius: 6px; padding: 3px; }
        .sb { flex: 1; border: none; background: transparent; color: var(--text-sec); padding: 8px 4px; border-radius: 4px; font-size: 11px; font-weight: 500; cursor: pointer; transition: 0.2s; }
        .sb.on { background: var(--text); color: var(--bg); font-weight: 600; }
        .sa { border: none; background: transparent; color: var(--c-forbidden); padding: 8px 12px; border-radius: 4px; font-size: 11px; font-weight: 600; cursor: pointer; margin-left: auto; }
        .cr { display: flex; align-items: center; gap: 12px; padding: 12px; margin-bottom: 12px; background: var(--surface-2); border-radius: 6px; border: 1px solid var(--border); }
        .ci { width: 36px; height: 36px; object-fit: contain; opacity: 0.8; }
        .cinfo { flex: 1; }
        .cn { font-weight: 600; font-size: 14px; margin-bottom: 2px; }
        .cd { font-size: 11px; color: var(--text-sec); }
        .co { background: var(--text); color: var(--bg); border: none; padding: 8px 16px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .cd { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--border); border-radius: 6px; padding: 12px 8px; text-align: center; display: flex; flex-direction: column; align-items: center; position: relative; transition: 0.2s; }
        .cd:active { background: var(--border); }
        .cd.rc { border-left-color: var(--c-common); } .cd.rr { border-left-color: var(--c-rare); } .cd.re { border-left-color: var(--c-epic); }
        .cd.lg { border-left-color: var(--c-legendary); } .cd.pl { border-left-color: var(--c-platinum); }
        .cd.my { border-left-color: var(--c-mythic); } .cd.fb { border-left-color: var(--c-forbidden); animation: g 0.4s infinite; }
        @keyframes g { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .cc { position: absolute; top: 6px; right: 6px; font-size: 11px; font-weight: 600; color: var(--text-2); }
        .ci { width: 80px; height: 80px; object-fit: contain; margin-bottom: 8px; }
        .cn { font-size: 13px; font-weight: 600; width: 100%; white-space: nowrap; overflow: hidden; text-align: center; text-overflow: ellipsis; margin-bottom: 2px; }
        .cs { font-size: 10px; color: var(--text-sec); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
        .bs { width: 100%; background: var(--surface-2); color: var(--text-sec); border: 1px solid var(--border); padding: 6px; border-radius: 4px; font-size: 11px; font-weight: 500; cursor: pointer; position: relative; }
        .bs:active { background: var(--border); }
        .sp { position: absolute; left: 50%; bottom: 100%; transform: translateX(-50%); background: var(--bg); color: var(--text); padding: 2px 6px; border-radius: 4px; font-size: 11px; border: 1px solid var(--border); white-space: nowrap; opacity: 0; animation: sp 1s ease-out; }
        @keyframes sp { 0% { opacity: 1; transform: translateX(-50%) translateY(0); } 100% { opacity: 0; transform: translateX(-50%) translateY(-12px); } }
        .list { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 4px; max-height: 450px; overflow-y: auto; }
        .list::-webkit-scrollbar { width: 4px; } .list::-webkit-scrollbar-track { background: transparent; } .list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        .r { display: flex; align-items: center; gap: 12px; padding: 12px; border-bottom: 1px solid var(--border); }
        .r:last-child { border-bottom: none; }
        .ri { width: 36px; height: 36px; object-fit: contain; opacity: 0.8; }
        .ri2 { flex: 1; }
        .rn { font-weight: 600; font-size: 14px; margin-bottom: 2px; }
        .rd { font-size: 12px; color: var(--text-sec); }
        .ai { font-size: 24px; opacity: 0.2; width: 30px; text-align: center; }
        .r.unlocked .ai { opacity: 1; }
        .an { font-weight: 600; font-size: 14px; color: var(--text); }
        .r:not(.unlocked) .an { color: var(--text-sec); }
        .ad { font-size: 12px; color: var(--text-sec); margin-top: 2px; }
        .empty { text-align: center; padding: 40px; color: var(--text-sec); font-size: 13px; }
    </style>
</head>
<body>
    <div class="c">
        <h1>PhoneClicker</h1>
        <div class="sub">MINIMAL v1.0</div>
        <div class="bal" id="balanceDisplay">0</div>
        <div class="menu">
            <button class="mb on" data-screen="main">Игра</button>
            <button class="mb" data-screen="inv">Инвентарь</button>
            <button class="mb" data-screen="shop">Магазин</button>
            <button class="mb" data-screen="ach">Ачивки</button>
        </div>

        <div class="sc on" id="screenMain">
            <div class="tr">
                <button class="bs" id="resetBtn">Сброс</button>
                <button class="bs" id="langBtn">RU</button>
            </div>
            <div class="disp" id="phoneDisplay">
                <img id="phoneImage" class="di" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23202020'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' font-size='40' fill='%233333' font-family='sans-serif'%3E?%3C/text%3E%3C/svg%3E" alt="Телефон">
                <span class="dn" id="phoneName" style="color: var(--text-sec)">???</span>
                <span class="ds" id="phoneModel">Нажми открыть</span>
            </div>
            <div class="tw">
                <div class="tl">Бесплатный телефон</div>
                <div class="tm" id="timerBasic">00:00</div>
            </div>
            <button class="bm" id="rollBasicBtn">Открыть</button>
            <div class="sr">
                <div class="sb"><span class="sv" id="totalOpened">0</span><span class="sl">Всего</span></div>
                <div class="sb"><span class="sv" id="uniquePhones">0</span><span class="sl">Уник.</span></div>
                <div class="sb"><span class="sv" id="bestRarity">-</span><span class="sl">Лучшая</span></div>
                <div class="sb"><span class="sv" id="totalSold">0</span><span class="sl">Продано</span></div>
            </div>
        </div>

        <div class="sc" id="screenInv"><div class="list" id="inventoryList"></div></div>
        <div class="sc" id="screenShop"><div class="list" id="shopList"></div></div>
        <div class="sc" id="screenAch"><div class="list" id="achList"></div></div>
    </div>

    <script>
    (function() {
        'use strict';
        let lang = 'ru', sort = 'default';

        const L = {
            ru: { play:'Игра', inv:'Инвентарь', shop:'Магазин', ach:'Ачивки', reset:'Сброс', getPhoneLabel:'Бесплатный телефон', openBtn:'Открыть', waiting:'Ожидание...', emptyInv:'Пусто', defModel:'Нажми открыть', getCaseName:'Кейс', getCaseDesc:'Редкие и выше', getCaseBtn:'Открыть', getBuyBtn:'Купить', getSellBtn:'Продать', noCoins:'Мало монет', confirmReset:'Сбросить прогресс?', achLocked:'Открывай кейсы...', shopName:'Кейс', shopDesc:'Редкие и выше', getPrice:'За', sortDef:'Все', sortRar:'Редкость', sortCnt:'Кол-во', sellAll:'Слить базу', sellAllConf:'Продать все обычные?' },
            uk: { play:'Гра', inv:'Інвентар', shop:'Магазин', ach:'Ачівки', reset:'Скинути', getPhoneLabel:'Безкоштовний телефон', openBtn:'Відкрити', waiting:'Очікування...', emptyInv:'Пусто', defModel:'Натисни відкрити', getCaseName:'Кейс', getCaseDesc:'Рідкісні та вище', getCaseBtn:'Відкрити', getBuyBtn:'Купити', getSellBtn:'Продати', noCoins:'Мало монет', confirmReset:'Скинути прогрес?', achLocked:'Відкривай кейси...', shopName:'Кейс', shopDesc:'Рідкісні та вище', getPrice:'За', sortDef:'Усі', sortRar:'Рідкість', sortCnt:'Кільк.', sellAll:'Злити базу', sellAllConf:'Продати всі звичайні?' }
        };
        const t = k => L[lang]?.[k] || k;
        const setLang = l => { lang = l; localStorage.setItem('pc_min_l', l); updateUI(); renderInv(); renderShop(); renderAch(); };
        const updateUI = () => {
            document.querySelector('[data-screen="main"]').textContent = t('play');
            document.querySelector('[data-screen="inv"]').textContent = t('inv');
            document.querySelector('[data-screen="shop"]').textContent = t('shop');
            document.querySelector('[data-screen="ach]').textContent = t('ach');
            document.getElementById('resetBtn').textContent = t('reset');
            document.querySelector('.tl').textContent = t('getPhoneLabel');
            document.getElementById('rollBasicBtn').textContent = tAct ? t('waiting') : t('openBtn');
            document.getElementById('langBtn').textContent = lang === 'uk' ? 'UA' : 'RU';
            const pm = document.getElementById('phoneName').textContent;
            const ml = document.getElementById('phoneModel');
            ml.textContent = pm === '???' ? t('defModel') : (PHONE_MAP[pm] ? `${getRarity(PHONE_MAP[pm].rarity)} • ${PHONE_MAP[pm].year}` : '');
        };
        const loadLang = () => { const s = localStorage.getItem('pc_min_l'); if (s === 'uk' || s === 'ru') lang = s; updateUI(); };
        
        const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');

        // Функция для создания текстовых заглушек (нужна, т.к. большинство картинок пока заглушки)
        const svg = (t, c) => `data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'%3E%3Crect width='200' height='200' fill='%23202020'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' font-size='30' fill='${c}' font-family='sans-serif'%3E${encodeURIComponent(t)}%3C/text%3E%3C/svg%3E`;

        // Базовые телефоны (Твои ссылки, исправленные с PhoneCallager на PhoneClicker)
        const BASIC = [
            { name: "iPhone 3GS", year: "2009", rarity: "common", image: "https://raw.githubusercontent.com/kolisnykgeorgiy2-source/PhoneClicker/main/images/iphone3gs.png" },
            { name: "iPhone 4", year: "2010", rarity: "common", image: "https://raw.githubusercontent.com/kolisnykgeorgiy2-source/PhoneClicker/main/images/iphone4.png" },
            { name: "Samsung Galaxy S2", year: "2011", rarity: "common", image: "https://raw.githubusercontent.com/kolisnykgeorgiy2-source/PhoneClicker/main/images/samsunggalaxys2.png" },
            { name: "Xiaomi Mi 1", year: "2011", rarity: "common", image: "https://raw.githubusercontent.com/kolisnykgeorgiy2-source/PhoneClicker/main/images/xiaomimi1.png" }
        ];

        // Кейсы (Платина 2%, Vivo X300 Ultra в платине, шансы пересчитаны: 46+26+15+7+2+4 = 100%)
        const CASE = [
            { name: "iPhone 5s", year: "2013", rarity: "rare", image: svg('5s', '#5b8fb9') },
            { name: "iPhone 6", year: "2014", rarity: "rare", image: svg('6', '#5b8fb9') },
            { name: "Pixel", year: "2016", rarity: "rare", image: svg('Pixel', '#5b8fb9') },
            { name: "iPhone X", year: "2017", rarity: "epic", image: "https://raw.githubusercontent.com/kolisnykgeorgiy2-source/PhoneClicker/main/images/iphonex.png" },
            { name: "iPhone 12", year: "2020", rarity: "epic", image: svg('12', '#8b5cf6') },
            { name: "Nokia 3310", year: "2000", rarity: "legendary", image: svg('3310', '#c8a215') },
            { name: "Razr V3", year: "2004", rarity: "legendary", image: svg('Razr', '#c8a215') },
            { name: "iPhone 2G", year: "2007", rarity: "mythic", image: svg('2G', '#c084fc') },
            { name: "Nokia 8110", year: "1996", rarity: "mythic", image: svg('8110', '#c084fc') },
            { name: "Z Fold 6", year: "2024", rarity: "platinum", image: svg('Fold 6', '#b0b0b0') },
            { name: "16 Pro Max", year: "2024", rarity: "platinum", image: svg('16PM', '#b0b0b0') },
            { name: "vivo X300 Ultra", year: "2024", rarity: "platinum", image: s('X300 Ultra', '#b0b0b0') },
            { name: "Note 7", year: "2016", rarity: "forbidden", image: svg('Note 7', '#ef4444') }
        ];

        const PM = {}; [...BASIC, ...CASE].forEach(p => PM[p.name] = p);

        const R = {
            common:    { label: {ru:"Обычный", uk:"Звичайний"}, color: "var(--c-common)", tier: 1, price: 10 },
            rare:      { label: {ru:"Редкий", uk:"Рідкісний"}, color: "var(--c-rare)", tier: 2, price: 50 },
            epic:      { label: {ru:"Эпический", uk:"Епічний"}, color: "var(--c-epic)", tier: 3, price: 150 },
            legendary: { label: {ru:"Легендарный", uk:"Легендарний"}, color: "var(--c-legendary)", tier: 4, price: 500 },
            mythic:    { label: {ru:"Мифический", uk:"Міфічний"}, color: "var(--c-mythic)", tier: 5, price: 1500 },
            platinum:  { label: {ru:"Платиновый", uk:"Платиновий"}, color: "var(--c-platinum)", tier: 6, price: 1000 },
            forbidden: { label: {ru:"Запрещено", uk:"Заборонено"}, color: "var(--c-forbidden)", tier: 7, price: 5000 }
        };

        // 46+26+15+7+2+4 = 100
        const CHANCES = { rare: 46, epic: 26, legendary: 15, mythic: 7, platinum: 2, forbidden: 4 };
        const CD = 20, CP = 100, SK = 'pc_min_s1';

        let col = {}, op = 0, sold = 0, bal = 0, cases = 0, achs = [];
        let tRB = 0, tRS = 0, tSA = 0, tID = null, tAct = false;

        const $ = id => document.getElementById(id);
        const fmt = s => `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
        const getTier = () => Object.keys(col).reduce((m, n) => { const p = PM[n]; return p ? Math.max(m, R[p.rarity].tier) : m; }, 0);
        const getR = r => R[r].label[lang] || r;

        const updateStats = () => {
            const u = Object.keys(col);
            el.totalOpened.textContent = op; el.uniquePhones.textContent = u.length; el.totalSold.textContent = sold; el.balanceDisplay.textContent = bal;
            const bT = getTier(); const bK = Object.keys(R).find(k => R[k].tier === bT);
            el.bestRarity.textContent = bK ? getR(bK) : '-';
            el.bestRarity.style.color = bK ? R[bK].color : 'var(--text-sec)';
            el.rollBasicBtn.textContent = tAct ? t('waiting') : t('openBtn');
        };

        const switchS = s => {
            document.querySelectorAll('.screen').forEach(e => e.classList.remove('active'));
            document.querySelectorAll('.menu-btn').forEach(e => e.classList.remove('active'));
            const map = { main: $('screenMain'), inv: $('screenInv'), shop: $('screenShop'), ach: $('screenAch') };
            if(map[s]) { map[s].classList.add('active'); document.querySelector(`[data-screen="${s}"]`).classList.add('active'); }
            if(s==='inv') renderInv(); if(s==='shop') renderShop(); if(s==='ach') renderAch();
        };

        const sell = (n, btn) => {
            if (!col[n] || col[n] <= 0) return;
            const p = PM[n]; if (!p) return;
            const price = R[p.rarity].price;
            col[n]--; if (col[n] <= 0) delete col[n];
            bal += price; sold++; updateStats(); save();
            if (btn) { const f = document.createElement('div'); f.className = 'sell-pop'; f.textContent = `+${price}`; btn.appendChild(f); setTimeout(() => f.remove(), 1000); }
            renderInv();
        };

        const sellAll = () => {
            if (!confirm('Продать все обычные телефоны?')) return; let e = 0;
            for (const n in col) { if (PM[n]?.rarity === 'common') { e += col[n] * R.common.price; sold += col[n]; delete col[n]; } }
            if (e) { bal += e; updateStats(); save(); renderInv(); }
        };

        const renderInv = () => {
            let h = '';
            if (cases > 0) {
                h += `<div class="cr"><img class="ci" src="${svg('📦','#555')"><div class="cinfo"><div class="cn">${t('getCaseName')}</div><div class="cd">${t('getCaseDesc')}</div></div><button class="co" id="openCaseBtn">${t('getCaseBtn')} (${cases})</button></div>`;
            }
            
            const hasC = Object.keys(col).some(n => PM[n]?.rarity === 'common');
            h += `<div class="ih"><button class="sb ${sort==='default'?'on':''}" data-sort="default">${t('sortDef')}</button><button class="sb ${sort==='rarity'?'on':''}" data-sort="rarity">${t('sortRar')}</button><button class="sb ${sort==='count'?'on':''}" data-sort="count">${t('sortCnt')}</button>${hasC?`<button class="sa" id="sellAllBtn">${t('sellAll')}</button>`:''}</div>`;

            let keys = Object.keys(col).filter(n => col[n] > 0 && PM[n]);
            if (sort === 'rarity') keys.sort((a, b) => R[PM[a].tier] - R[PM[b].tier);
            else if (sort === 'count') keys.sort((a, b) => col[b] - col[a]);

            if (!keys.length) { h += `<div class="empty">${t('emptyInv')}</div>`; }
            else {
                h += `<div class="grid">`;
                for (const n of keys) {
                    const c = col[n], p = PM[n], r = R[p.rarity];
                    h += `<div class="cd ${`r.color.replace('var(--c-','')}">${c > 1 ? `<span class="cc">x${c}</span>` : ''}<img class="ci" src="${esc(p.image)}" alt=""><div class="ri"><div class="cn">${esc(n)}</div><div class="cs" style="color:${r.color}">${getR(p.rarity)}</div><button class="bs" data-phone='${esc(n)}'>${t('getSellBtn')}</button></div></div>`;
                }
                h += `</div>`;
            }
            el.inventoryList.innerHTML = h;
            el.inventoryList.querySelectorAll('.bs').forEach(b => b.addEventListener('click', function() { sell(this.dataset.phone, this); }));
            const oC = document.getElementById('openCaseBtn'); if(oC) oC.addEventListener('click', openCase);
            const sA = document.getElementById('sellAllBtn'); if(sA) sA.addEventListener('click', sellAll);
            el.inventoryList.querySelectorAll('.sb').forEach(b => b.addEventListener('click', function() { sort = this.dataset.sort; renderInv(); }));
        };

        const openCase = () => {
            if (cases <= 0) return; cases--;
            let rar = 'rare', cum = 0;
            for (const k of ['rare','epic','legendary','mythic','platinum','forbidden']) { cum += CHANCES[k]; if (Math.random()*100 < cum) { rar = k; break; } }
            const pool = CASE.filter(p => p.rarity === rar);
            const ph = pool[Math.floor(Math.random() * pool.length)];
            applyDisp(ph); col[ph.name] = (col[ph.name] || 0) + 1;
            op++; updateStats(); checkAch(ph); save(); renderInv();
            setTimeout(() => switchS('main'), 300);
        };

        const renderShop = () => {
            el.shopList.innerHTML = `<div class="r"><img class="ri" src="${svg('📦','#555')"><div class="ri2"><div class="rn">${t('shopName')}</div><div class="rd">${t('shopDesc')}</div><div class="rd" style="color:var(--text);font-weight:600;margin-top:2px;">${t('getPrice')} ${CP}</div></div><button class="co" id="buyBtn">${t('getBuyBtn')}</button></div>`;
            document.getElementById('buyBtn').addEventListener('click', buyCase);
        };

        const buyCase = () => { if (bal < CP) { alert(t('noCoins')); return; } bal -= CP; cases++; updateStats(); save(); renderShop(); renderInv(); };

        const checkAch = ph => {
            const s = { totalOpened: op, bestTier: getTier() };
            let ch = false;
            for (const a of achs) {
                if (achs.includes(a.id)) continue;
                if (a.check.length > 1 && ph) { if (a.check(s, ph)) { achs.push(a.id); ch = true; } }
                else if (a.check(s)) { achs.push(a.id); ch = true; }
            }
            if (ch) { renderAch(); save(); }
        };

        const renderAch = () => {
            let h = '';
            for (const a of achs) {
                const u = achs.includes(a.id);
                h += `<div class="r ${u ? 'unlocked' : ''}"><div class="ai">${a.icon}</div><div class="ri2"><div class="an">${u ? a.name[lang] || '???'}</div><div class="ad">${u ? a.desc[lang] || t('achLocked')}</div></div></div></div>`;
            }
            el.achList.innerHTML = h;
        };

        const save = () => localStorage.setItem(SK, JSON.stringify({ col, op, sold, bal, cases, achs, tRB: tAct ? Math.max(0, tRB - (performance.now() - tSA) / 1000) : 0 } ));
        const load = () => {
            try {
                const raw = localStorage.getItem(SK); if (!raw) return; const d = JSON.parse(raw);
                if (d.col && typeof d.col === 'object' && !Array.isArray(d.col)) col = d.col;
                else { col = {}; if (Array.isArray(d.col)) d.col.forEach(p => { col[p.name] = (col[p.name] || 0) + 1; }); }
                op = d.op || 0; sold = d.sold || 0; bal = d.bal || 0; cases = d.cases || 0; achs = d.achs || [];
                updateStats(); renderAch();
                let rem = d.tRB || 0; if (rem > 30) rem = CD;
                if (rem > 0) startT(Math.ceil(rem)); else clearT();
            } catch(e) { col = {}; op = 0; sold = 0; bal = 0; cases = 0; achs = []; }
        };

        const resetG = () => {
            if (!confirm('Сбросить весь прогресс?')) return; localStorage.removeItem(SK);
            col = {}; op = 0; sold = 0; bal = 0; cases = 0; achs = []; clearT();
            el.phoneImage.src = svg('?', '#333'); el.phoneName.textContent = '???'; el.phoneName.style.color = 'var(--text-sec)';
            el.phoneModel.textContent = t('defModel'); el.phoneModel.style.color = 'var(--text-sec)';
            el.phoneDisplay.style.borderColor = 'var(--border)'; updateStats(); renderInv(); renderShop(); renderAch();
        };

        const clearT = () => { if (tID) clearInterval(tID); tID = null; tAct = false; tRB = 0; el.rollBasicBtn.disabled = false; el.rollBasicBtn.textContent = t('openBtn'); el.timerBasic.textContent = '00:00'; };
        const tick = () => { const l = Math.max(0, Math.ceil(tRB - (performance.now() - tSA) / 1000)); el.timerBasic.textContent = fmt(l); if (l <= 0) { clearT(); save(); } };
        const startT = s => { if (tID) clearInterval(tID); tRB = s; tSA = performance.now(); tAct = true; el.rollBasicBtn.disabled = true; el.rollBasicBtn.textContent = t('waiting'); tick(); tID = setInterval(tick, 500); save(); };

        const applyDisp = p => {
            const r = R[p.rarity]; el.phoneImage.src = p.image;
            el.phoneName.textContent = p.name; el.phoneName.style.color = r.color;
            el.phoneModel.textContent = `${getR(p.rarity)} • ${p.year}`; el.phoneModel.style.color = r.color;
            el.phoneDisplay.style.borderColor = r.color;
            if (p.rarity === 'forbidden') { el.phoneName.classList.add('rarity-forbidden-text'); el.phoneModel.classList.add('rarity-forbidden-text'); }
            else { el.phoneName.classList.remove('rarity-forbidden-text'); el.phoneModel.classList.remove('rarity-forbidden-text'); }
            el.phoneImage.style.animation = 'none'; void el.phoneImage.offsetWidth; el.phoneImage.style.animation = 'p 0.3s';
        };

        const rollB = () => {
            if (tAct) return;
            const p = BASIC[Math.floor(Math.random() * BASIC.length)];
            applyDisp(p); col[p.name] = (col[p.name] || 0) + 1;
            op++; updateStats(); checkAch(p); save(); startT(CD);
        };

        el.rollBasicBtn.addEventListener('click', rollB);
        el.resetBtn.addEventListener('click', resetG);
        el.langBtn.addEventListener('click', () => setLang(lang === 'uk' ? 'ru' : 'uk'));
        document.querySelectorAll('.menu-btn').forEach(b => b.addEventListener('click', () => switchS(b.dataset.screen)));

        loadLang(); renderShop(); renderAch(); load(); updateStats();
    })();
    </script>
</body>
</html>
