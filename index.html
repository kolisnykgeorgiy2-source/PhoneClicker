<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhoneClicker Pre-Alpha 0F</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>📱</text></svg>">
    <style>
        :root {
            --neon-pink: #ff2d75;
            --neon-blue: #00d4ff;
            --neon-purple: #b347ea;
            --neon-green: #39ff14;
            --neon-yellow: #ffe600;
            --forbidden-red: #dc143c;
            --bg-dark: #0a0a0f;
            --glass: rgba(16, 18, 27, 0.8);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-dark);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; min-height: 100dvh;
            padding: 12px; color: #fff;
            -webkit-user-select: none; user-select: none;
            overflow-x: hidden;
            background-image: 
                radial-gradient(ellipse at 20% 50%, rgba(255,45,117,0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(0,212,255,0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(179,71,234,0.15) 0%, transparent 50%);
        }
        body.low-spec .game-container,
        body.low-spec .phone-display,
        body.low-spec .list-container,
        body.low-spec .timer,
        body.low-spec .stat-box {
            backdrop-filter: none;
            box-shadow: none !important;
        }
        body.low-spec .phone-display::before { display: none; }
        body.low-spec .particles { display: none; }
        .particles {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }
        .particle {
            position: absolute; background: var(--neon-blue);
            border-radius: 50%; opacity: 0.6;
            animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.8; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }
        .game-container {
            position: relative; z-index: 1;
            background: var(--glass);
            backdrop-filter: blur(20px);
            padding: 20px 16px; border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,45,117,0.3);
            width: 100%; max-width: 420px;
            transition: all 0.3s ease;
        }
        h1 {
            font-size: 28px; font-weight: 900; letter-spacing: 1px;
            background: linear-gradient(135deg, var(--neon-pink), var(--neon-blue));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; margin-bottom: 2px; text-align: center;
        }
        .status {
            text-align: center; font-size: 11px; color: rgba(255,255,255,0.5);
            letter-spacing: 2px; margin-bottom: 10px; text-transform: uppercase;
        }
        .balance-bar {
            display: flex; justify-content: center; align-items: center;
            gap: 8px; margin-bottom: 10px; padding: 8px 16px;
            background: rgba(255,215,0,0.1); border-radius: 20px;
            border: 1px solid rgba(255,215,0,0.3);
        }
        .balance-icon { font-size: 24px; }
        .balance-value { font-size: 20px; font-weight: bold; color: #ffd700; }
        .menu-bar {
            display: flex; gap: 6px; margin-bottom: 15px;
            background: rgba(0,0,0,0.4); border-radius: 20px; padding: 4px;
        }
        .menu-btn {
            flex: 1; background: transparent; border: none;
            color: rgba(255,255,255,0.6); font-size: 12px; font-weight: bold;
            padding: 10px 4px; border-radius: 18px; cursor: pointer;
            transition: all 0.3s; position: relative; overflow: hidden;
        }
        .menu-btn.active {
            background: rgba(255,45,117,0.25); color: #fff;
            box-shadow: 0 0 15px rgba(255,45,117,0.4);
        }
        .screen { display: none; animation: screenIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .screen.active { display: block; }
        @keyframes screenIn {
            0% { opacity: 0; transform: translateY(10px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        .phone-display {
            background: rgba(0,0,0,0.5); border-radius: 24px; padding: 20px 16px;
            margin-bottom: 15px; text-align: center;
            border: 2px solid transparent;
            transition: all 0.4s ease;
            position: relative; overflow: hidden;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .phone-display::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(255,255,255,0.1), transparent, rgba(255,255,255,0.1), transparent);
            animation: rotateGlow 10s linear infinite;
            opacity: 0.3;
        }
        @keyframes rotateGlow { 100% { transform: rotate(360deg); } }
        .phone-image {
            width: 240px; height: 240px;
            object-fit: contain;
            display: block; margin: 0 auto;
            position: relative; z-index: 1;
            border-radius: 16px;
            filter: drop-shadow(0 0 25px currentColor);
            animation: bounceIn 0.5s;
        }
        @keyframes bounceIn {
            0% { transform: scale(0); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        .phone-name {
            font-size: 24px; font-weight: 800; margin-top: 8px; position: relative; z-index: 1;
        }
        .phone-model { font-size: 14px; color: rgba(255,255,255,0.7); position: relative; z-index: 1; }
        .timer {
            font-size: 28px; font-weight: 900; letter-spacing: 2px;
            text-align: center; margin: 5px 0; padding: 8px;
            background: rgba(0,0,0,0.6); border-radius: 16px;
            color: var(--neon-yellow); text-shadow: 0 0 10px var(--neon-yellow);
            font-variant-numeric: tabular-nums;
            border: 1px solid rgba(255,230,0,0.3);
        }
        .btn {
            border: none; width: 100%; padding: 12px; border-radius: 30px;
            font-weight: bold; font-size: 14px; letter-spacing: 1px;
            cursor: pointer; transition: all 0.2s; position: relative;
            overflow: hidden; text-transform: uppercase;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--neon-pink), #c0392b);
            color: #fff; box-shadow: 0 6px 20px rgba(255,45,117,0.5);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .btn-primary:active { transform: scale(0.96); box-shadow: 0 4px 10px rgba(255,45,117,0.7); }
        .btn-primary:disabled {
            background: #3a3a4a; box-shadow: none; color: #888; border-color: transparent;
            cursor: not-allowed;
        }
        .btn-case {
            background: linear-gradient(135deg, #4a00e0, #8e2de2);
            color: #fff; box-shadow: 0 6px 20px rgba(138,43,226,0.5);
            border: 1px solid rgba(255,255,255,0.2);
            margin-top: 8px;
        }
        .btn-case:active { transform: scale(0.96); box-shadow: 0 4px 10px rgba(138,43,226,0.7); }
        .btn-case:disabled {
            background: #3a3a4a; box-shadow: none; color: #888; border-color: transparent;
            cursor: not-allowed;
        }
        .btn-reset {
            background: transparent; color: rgba(255,255,255,0.6); font-size: 13px;
            border: 1px solid rgba(255,255,255,0.15); margin-bottom: 12px; padding: 10px;
            box-shadow: none;
        }
        .btn-low-spec {
            background: transparent; color: rgba(255,255,255,0.7); font-size: 14px;
            border: 1px solid rgba(255,255,255,0.2); margin-bottom: 8px; padding: 8px 14px;
            border-radius: 20px;
        }
        .btn-low-spec.active { background: rgba(255,45,117,0.2); border-color: var(--neon-pink); }
        .btn-lang {
            background: transparent; color: rgba(255,255,255,0.7); font-size: 14px;
            border: 1px solid rgba(255,255,255,0.2); margin-bottom: 8px; padding: 8px 14px;
            border-radius: 20px; cursor: pointer;
        }
        
        /* === ИНВЕНТАРЬ === */
        .inv-controls {
            display: flex; gap: 6px; margin-bottom: 12px;
        }
        .sort-btn {
            flex: 1; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.6); padding: 8px 4px; border-radius: 12px;
            font-size: 11px; font-weight: bold; cursor: pointer; transition: all 0.2s;
        }
        .sort-btn.active {
            background: rgba(255,45,117,0.2); border-color: var(--neon-pink); color: #fff;
        }
        .btn-sell-all {
            background: rgba(255,215,0,0.1); color: #ffd700; border: 1px solid rgba(255,215,0,0.3);
            padding: 8px; border-radius: 12px; font-size: 11px; font-weight: bold; cursor: pointer;
            transition: all 0.2s;
        }
        .btn-sell-all:active { background: rgba(255,215,0,0.3); }

        .case-banner {
            background: linear-gradient(135deg, rgba(138,43,226,0.2), rgba(75,0,224,0.4));
            border: 1px solid #8e2de2; border-radius: 16px;
            padding: 12px; margin-bottom: 12px; display: flex; align-items: center; gap: 12px;
        }
        .case-banner-icon { width: 50px; height: 50px; object-fit: contain; filter: drop-shadow(0 0 8px #8e2de2); }
        .case-banner-info { flex: 1; }
        .case-banner-name { font-weight: bold; color: #c084fc; }
        .case-banner-desc { font-size: 11px; color: rgba(255,255,255,0.6); }
        .btn-open-case {
            background: rgba(138,43,226,0.5); color: #fff; border: none;
            padding: 8px 16px; border-radius: 20px; font-weight: bold; font-size: 12px; cursor: pointer;
        }
        .btn-open-case:active { background: rgba(138,43,226,0.8); }

        .inv-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .inv-card {
            background: rgba(0,0,0,0.4); border-radius: 16px; padding: 10px;
            border: 1px solid rgba(255,255,255,0.1); text-align: center;
            display: flex; flex-direction: column; align-items: center; position: relative;
            transition: all 0.2s; overflow: hidden;
        }
        .inv-card:active { transform: scale(0.95); }
        .inv-card.rarity-common { border-color: rgba(57, 255, 20, 0.3); box-shadow: inset 0 0 20px rgba(57, 255, 20, 0.1); }
        .inv-card.rarity-rare { border-color: rgba(0, 212, 255, 0.3); box-shadow: inset 0 0 20px rgba(0, 212, 255, 0.1); }
        .inv-card.rarity-epic { border-color: rgba(179, 71, 234, 0.3); box-shadow: inset 0 0 20px rgba(179, 71, 234, 0.1); }
        .inv-card.rarity-legendary { border-color: rgba(255, 230, 0, 0.3); box-shadow: inset 0 0 20px rgba(255, 230, 0, 0.1); }
        .inv-card.rarity-mythic { border-color: rgba(255, 45, 117, 0.3); box-shadow: inset 0 0 20px rgba(255, 45, 117, 0.1); }
        .inv-card.rarity-forbidden { border-color: rgba(220, 20, 60, 0.5); box-shadow: inset 0 0 30px rgba(255, 0, 0, 0.2); animation: glitchBorder 0.5s infinite; }
        
        @keyframes glitchBorder {
            0% { border-color: rgba(220, 20, 60, 0.5); }
            50% { border-color: rgba(255, 0, 0, 0.8); }
            100% { border-color: rgba(220, 20, 60, 0.5); }
        }

        .inv-card-count {
            position: absolute; top: 6px; right: 6px;
            background: rgba(0,0,0,0.8); padding: 2px 8px; border-radius: 10px;
            font-size: 12px; font-weight: bold; color: var(--neon-pink);
        }
        .inv-card-img { width: 80px; height: 80px; object-fit: contain; margin: 5px 0; filter: drop-shadow(0 0 8px currentColor); }
        .inv-card-name { font-size: 13px; font-weight: bold; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .inv-card-rarity { font-size: 10px; margin-bottom: 8px; opacity: 0.8; }
        .btn-sell-card {
            width: 100%; background: rgba(255,215,0,0.15); color: #ffd700;
            border: 1px solid rgba(255,215,0,0.3); padding: 6px; border-radius: 12px;
            font-size: 11px; font-weight: bold; cursor: pointer; position: relative;
        }
        .btn-sell-card:active { background: rgba(255,215,0,0.4); }
        .sell-flash {
            position: absolute; left: 50%; bottom: 100%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: #39ff14; padding: 2px 6px;
            border-radius: 8px; font-size: 12px; white-space: nowrap; opacity: 0;
            animation: sellFlash 1s ease-out;
        }
        @keyframes sellFlash {
            0% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
        }
        /* ======================= */

        .stats-row { display: flex; gap: 8px; margin-top: 12px; }
        .stat-box {
            flex: 1; background: rgba(0,0,0,0.5); border-radius: 16px;
            padding: 12px 4px; text-align: center; backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .stat-value { font-size: 20px; font-weight: 900; color: var(--neon-pink); }
        .stat-label { font-size: 9px; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 1px; }
        .list-container {
            background: rgba(0,0,0,0.5); border-radius: 24px; padding: 12px;
            max-height: 450px; overflow-y: auto; backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .achieve-item, .shop-item {
            display: flex; align-items: center; gap: 10px; padding: 10px 6px;
            border-bottom: 1px solid rgba(255,255,255,0.08); transition: background 0.3s;
            border-radius: 12px;
        }
        .achieve-item:active, .shop-item:active { background: rgba(255,45,117,0.15); }
        .achieve-item:last-child, .shop-item:last-child { border-bottom: none; }
        .shop-icon { width: 48px; height: 48px; border-radius: 12px; object-fit: contain; filter: drop-shadow(0 0 5px currentColor); }
        .shop-info { flex: 1; }
        .shop-name { font-weight: bold; font-size: 15px; }
        .achieve-icon { font-size: 36px; opacity: 0.2; transition: all 0.5s; }
        .achieve-item.unlocked .achieve-icon { opacity: 1; filter: drop-shadow(0 0 10px currentColor); }
        .achieve-info { flex: 1; }
        .achieve-name { font-weight: bold; font-size: 16px; }
        .achieve-desc { font-size: 12px; color: rgba(255,255,255,0.5); }
        .achieve-item:not(.unlocked) .achieve-name { color: #555; }
        .empty-msg { text-align: center; padding: 30px; color: rgba(255,255,255,0.4); font-style: italic; }
        .list-container::-webkit-scrollbar { width: 4px; }
        .list-container::-webkit-scrollbar-track { background: transparent; }
        .list-container::-webkit-scrollbar-thumb { background: var(--neon-pink); border-radius: 4px; }
        .rarity-forbidden {
            animation: glitch 0.3s infinite;
            text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000, 0 0 40px #ff0000;
        }
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
        .label-timer { font-size: 12px; color: rgba(255,255,255,0.6); text-transform: uppercase; margin-bottom: 2px; }
        .top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; gap: 8px; }
    </style>
</head>
<body class="">
    <div class="particles" id="particlesContainer"></div>
    <div class="game-container">
        <h1>📱 PhoneClicker</h1>
        <p class="status">Pre-Alpha 0F</p>
        <div class="balance-bar">
            <span class="balance-icon">💰</span>
            <span class="balance-value" id="balanceDisplay">0</span>
        </div>
        <div class="menu-bar">
            <button class="menu-btn active" data-screen="main" id="menuMain">🎮 Гра</button>
            <button class="menu-btn" data-screen="inventory" id="menuInventory">📦 Інвентар</button>
            <button class="menu-btn" data-screen="shop" id="menuShop">🛒 Магазин</button>
            <button class="menu-btn" data-screen="achieve" id="menuAchieve">🏆 Ачівки</button>
        </div>

        <div class="screen active" id="screenMain">
            <div class="top-row">
                <button class="btn btn-reset" id="resetBtn">🗑 Скинути</button>
                <button class="btn btn-lang" id="langBtn">UA</button>
                <button class="btn btn-low-spec" id="lowSpecBtn">⚡</button>
            </div>
            <div class="phone-display" id="phoneDisplay">
                <img id="phoneImage" class="phone-image" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='80' font-size='80'%3E📦%3C/text%3E%3C/svg%3E" alt="Телефон">
                <span class="phone-name" id="phoneName">???</span>
                <span class="phone-model" id="phoneModel">Натисни кнопку</span>
            </div>
            <div class="label-timer" id="basicPhoneLabel">📱 Безкоштовний телефон</div>
            <div class="timer" id="timerBasic">00:00</div>
            <button class="btn btn-primary" id="rollBasicBtn">📱 Відкрити</button>

            <div class="stats-row">
                <div class="stat-box"><div class="stat-value" id="totalOpened">0</div><div class="stat-label" id="statOpened">Відкрито</div></div>
                <div class="stat-box"><div class="stat-value" id="uniquePhones">0</div><div class="stat-label" id="statUnique">Унік.</div></div>
                <div class="stat-box"><div class="stat-value" id="bestRarity">-</div><div class="stat-label" id="statBest">Краща</div></div>
                <div class="stat-box"><div class="stat-value" id="totalSold">0</div><div class="stat-label" id="statSold">Продано</div></div>
            </div>
        </div>

        <div class="screen" id="screenInventory">
            <div class="list-container" id="inventoryList"></div>
        </div>

        <div class="screen" id="screenShop">
            <div class="list-container" id="shopList"></div>
        </div>

        <div class="screen" id="screenAchieve">
            <div class="list-container" id="achieveList"></div>
        </div>
    </div>
    <script>
    (function() {
        'use strict';

        const LANG_KEY = 'phoneclicker_lang';
        let currentLang = 'uk';
        let inventorySort = 'default';

        const translations = {
            ru: {
                menuGame: '🎮 Игра', menuInventory: '📦 Инвентарь', menuShop: '🛒 Магазин', menuAchieve: '🏆 Ачивки',
                resetBtn: '🗑 Сбросить', basicPhoneLabel: '📱 Бесплатный телефон', rollBasicBtn: '📱 Открыть',
                statOpened: 'Открыто', statUnique: 'Уник.', statBest: 'Лучшая', statSold: 'Продано',
                emptyInventory: '📦 Пока пусто...', phoneModelDefault: 'Нажми кнопку',
                caseItemName: 'Кейс с телефонами', caseItemDesc: 'Содержит редкие и выше', openCaseBtn: 'Открыть',
                buyCaseBtn: 'Купить', sellBtn: 'Продать', notEnoughCoins: 'Недостаточно монет!',
                confirmReset: 'Точно сбросить весь прогресс?', waiting: '⏳ Ожидание...',
                achievementLockedDesc: 'Продолжай открывать телефоны...',
                shopCaseName: 'Кейс с телефонами', shopCaseDesc: 'Содержит редкие и выше', shopCasePrice: 'Цена:',
                sortDefault: 'По умолчанию', sortRarity: 'По редкости', sortCount: 'По кол-ву',
                sellAllCommon: 'Продать обычных', confirmSellAll: 'Продать все обычные телефоны?'
            },
            uk: {
                menuGame: '🎮 Гра', menuInventory: '📦 Інвентар', menuShop: '🛒 Магазин', menuAchieve: '🏆 Ачівки',
                resetBtn: '🗑 Скинути', basicPhoneLabel: '📱 Безкоштовний телефон', rollBasicBtn: '📱 Відкрити',
                statOpened: 'Відкрито', statUnique: 'Унік.', statBest: 'Краща', statSold: 'Продано',
                emptyInventory: '📦 Поки пусто...', phoneModelDefault: 'Натисни кнопку',
                caseItemName: 'Кейс із телефонами', caseItemDesc: 'Містить рідкісні та вище', openCaseBtn: 'Відкрити',
                buyCaseBtn: 'Купити', sellBtn: 'Продати', notEnoughCoins: 'Недостатньо монет!',
                confirmReset: 'Точно скинути весь прогрес?', waiting: '⏳ Очікування...',
                achievementLockedDesc: 'Продовжуй відкривати телефони...',
                shopCaseName: 'Кейс із телефонами', shopCaseDesc: 'Містить рідкісні та вище', shopCasePrice: 'Ціна:',
                sortDefault: 'За замовч.', sortRarity: 'За рідкістю', sortCount: 'За кільк.',
                sellAllCommon: 'Продати звичайних', confirmSellAll: 'Продати всі звичайні телефони?'
            }
        };

        function t(key) { return translations[currentLang]?.[key] || key; }

        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem(LANG_KEY, lang);
            updateUITexts();
            renderInventory();
            renderShop();
            renderAchievements();
        }

        function updateUITexts() {
            document.getElementById('menuMain').textContent = t('menuGame');
            document.getElementById('menuInventory').textContent = t('menuInventory');
            document.getElementById('menuShop').textContent = t('menuShop');
            document.getElementById('menuAchieve').textContent = t('menuAchieve');
            document.getElementById('resetBtn').textContent = t('resetBtn');
            document.getElementById('basicPhoneLabel').textContent = t('basicPhoneLabel');
            document.getElementById('rollBasicBtn').textContent = timerActiveBasic ? t('waiting') : t('rollBasicBtn');
            document.getElementById('statOpened').textContent = t('statOpened');
            document.getElementById('statUnique').textContent = t('statUnique');
            document.getElementById('statBest').textContent = t('statBest');
            document.getElementById('statSold').textContent = t('statSold');

            const phoneModelEl = document.getElementById('phoneModel');
            if (document.getElementById('phoneName').textContent === '???') {
                phoneModelEl.textContent = t('phoneModelDefault');
            } else {
                const currentPhone = PHONE_MAP[document.getElementById('phoneName').textContent];
                if (currentPhone) {
                    phoneModelEl.textContent = `${getRarityLabel(currentPhone.rarity)} • ${currentPhone.year}`;
                }
            }
            document.getElementById('langBtn').textContent = currentLang === 'uk' ? 'UA' : 'RU';
        }

        function loadLanguage() {
            const saved = localStorage.getItem(LANG_KEY);
            currentLang = (saved && (saved === 'uk' || saved === 'ru')) ? saved : 'uk';
            updateUITexts();
        }

        function escapeHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        function placeholderSvg(text, bgColor) {
            return `data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 300 300'%3E%3Crect width='300' height='300' fill='${bgColor}'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' font-size='40' fill='white' font-family='sans-serif'%3E${encodeURIComponent(text)}%3C/text%3E%3C/svg%3E`;
        }

        const particlesContainer = document.getElementById('particlesContainer');
        for (let i = 0; i < 40; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            const size = Math.random() * 4 + 2;
            particle.style.width = size + 'px'; particle.style.height = size + 'px';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDuration = Math.random() * 10 + 8 + 's';
            particle.style.animationDelay = Math.random() * 5 + 's';
            particle.style.background = ['#ff2d75','#00d4ff','#b347ea','#39ff14'][Math.floor(Math.random()*4)];
            particlesContainer.appendChild(particle);
        }

        const BASIC_PHONES = [
            { name: "iPhone 3GS", year: "2009", rarity: "common", image: "https://raw.githubusercontent.com/kolisnykgeorgiy2-source/PhoneClicker/main/images/iphone3gs.png" },
            { name: "iPhone 4", year: "2010", rarity: "common", image: placeholderSvg('iPhone 4', '39ff14') },
            { name: "Samsung Galaxy S2", year: "2011", rarity: "common", image: placeholderSvg('Galaxy S2', '39ff14') },
            { name: "Xiaomi Mi 1", year: "2011", rarity: "common", image: placeholderSvg('Mi 1', '39ff14') }
        ];
        const CASE_PHONES = [
            { name: "iPhone 5s", year: "2013", rarity: "rare", image: placeholderSvg('iPhone 5s', '00d4ff') },
            { name: "iPhone 6", year: "2014", rarity: "rare", image: placeholderSvg('iPhone 6', '00d4ff') },
            { name: "Google Pixel", year: "2016", rarity: "rare", image: placeholderSvg('Pixel', '00d4ff') },
            { name: "iPhone X", year: "2017", rarity: "epic", image: https://raw.githubusercontent.com/kolisnykgeorgiy2-source/PhoneClicker/main/images/iphonex.png },
            { name: "iPhone 12", year: "2020", rarity: "epic", image: placeholderSvg('iPhone 12', 'b347ea') },
            { name: "Nokia 3310", year: "2000", rarity: "legendary", image: placeholderSvg('Nokia 3310', 'ffe600') },
            { name: "Motorola Razr V3", year: "2004", rarity: "legendary", image: placeholderSvg('Razr V3', 'ffe600') },
            { name: "iPhone 2G (первый)", year: "2007", rarity: "mythic", image: placeholderSvg('iPhone 2G', 'ff2d75') },
            { name: "Nokia 8110 \"банан\"", year: "1996", rarity: "mythic", image: placeholderSvg('Nokia 8110', 'ff2d75') },
            { name: "Samsung Galaxy Note 7", year: "2016", rarity: "forbidden", image: placeholderSvg('Note 7', 'dc143c') }
        ];

        const PHONE_MAP = {};
        [...BASIC_PHONES, ...CASE_PHONES].forEach(p => { PHONE_MAP[p.name] = p; });

        const RARITY = {
            common:    { label: {ru: "Обычный", uk: "Звичайний"}, color: "#39ff14", tier: 1, glow: "0 0 20px #39ff14", price: 10 },
            rare:      { label: {ru: "Редкий", uk: "Рідкісний"}, color: "#00d4ff", tier: 2, glow: "0 0 20px #00d4ff", price: 50 },
            epic:      { label: {ru: "Эпический", uk: "Епічний"}, color: "#b347ea", tier: 3, glow: "0 0 25px #b347ea", price: 150 },
            legendary: { label: {ru: "Легендарный", uk: "Легендарний"}, color: "#ffe600", tier: 4, glow: "0 0 30px #ffe600", price: 500 },
            mythic:    { label: {ru: "Мифический", uk: "Міфічний"}, color: "#ff2d75", tier: 5, glow: "0 0 35px #ff2d75", price: 1500 },
            forbidden: { label: {ru: "Запрещено", uk: "Заборонено"}, color: "#dc143c", tier: 6, glow: "0 0 40px #ff0000, 0 0 80px #ff0000", price: 5000 }
        };

        function getRarityLabel(rarity) { return RARITY[rarity].label[currentLang] || rarity; }

        const CASE_CHANCES = { rare: 46, epic: 28, legendary: 15, mythic: 7, forbidden: 4 };
        const COOLDOWN_BASIC = 20;
        const CASE_PRICE = 100;

        const ACHIEVEMENTS = [
            { id: "first_roll", name: {ru: "Первый телефон", uk: "Перший телефон"}, desc: {ru: "Открыть телефон впервые", uk: "Відкрити телефон вперше"}, icon: "📱", check: s => s.totalOpened >= 1 },
            { id: "roll_10", name: {ru: "Коллекционер", uk: "Колекціонер"}, desc: {ru: "Открыть 10 телефонов", uk: "Відкрити 10 телефонів"}, icon: "📦", check: s => s.totalOpened >= 10 },
            { id: "roll_50", name: {ru: "Фанатик", uk: "Фанатик"}, desc: {ru: "Открыть 50 телефонов", uk: "Відкрити 50 телефонів"}, icon: "🔥", check: s => s.totalOpened >= 50 },
            { id: "first_rare", name: {ru: "Везунчик", uk: "Щасливчик"}, desc: {ru: "Найти редкий телефон", uk: "Знайти рідкісний телефон"}, icon: "💎", check: (s, phone) => phone && RARITY[phone.rarity].tier === 2 },
            { id: "first_epic", name: {ru: "Эпическая удача", uk: "Епічна удача"}, desc: {ru: "Найти эпический телефон", uk: "Знайти епічний телефон"}, icon: "✨", check: (s, phone) => phone && RARITY[phone.rarity].tier === 3 },
            { id: "first_legend", name: {ru: "Легенда", uk: "Легенда"}, desc: {ru: "Найти легендарный телефон", uk: "Знайти легендарний телефон"}, icon: "👑", check: (s, phone) => phone && RARITY[phone.rarity].tier === 4 },
            { id: "first_mythic", name: {ru: "Миф стал реальностью", uk: "Міф став реальністю"}, desc: {ru: "Найти мифический телефон", uk: "Знайти міфічний телефон"}, icon: "🌟", check: (s, phone) => phone && RARITY[phone.rarity].tier === 5 },
            { id: "first_forbidden", name: {ru: "Запретный плод", uk: "Заборонений плід"}, desc: {ru: "Найти запрещённый телефон", uk: "Знайти заборонений телефон"}, icon: "🚫", check: (s, phone) => phone && RARITY[phone.rarity].tier === 6 },
            { id: "all_common", name: {ru: "Базовый набор", uk: "Базовий набір"}, desc: {ru: "Собрать все обычные телефоны", uk: "Зібрати всі звичайні телефони"}, icon: "✅", check: s => s.uniqueByRarity.common >= 4 },
            { id: "all_mythic", name: {ru: "Хранитель мифов", uk: "Хранитель міфів"}, desc: {ru: "Собрать все мифические телефоны", uk: "Зібрати всі міфічні телефони"}, icon: "🏆", check: s => s.uniqueByRarity.mythic >= 2 }
        ];

        const SAVE_KEY = 'phoneclicker_save_v7';

        let collection = {}; let totalOpened = 0; let totalSold = 0; let balance = 0; let caseCount = 0;
        let unlockedAchievements = []; let uniqueByRarity = { common: 0, rare: 0, epic: 0, legendary: 0, mythic: 0, forbidden: 0 };
        let timerRemainingBasic = 0, timerStartBasic = 0, timerActiveBasic = false, timerIdBasic = null, lowSpecMode = false;

        const $ = id => document.getElementById(id);
        const el = {
            phoneDisplay: $('phoneDisplay'), phoneImage: $('phoneImage'), phoneName: $('phoneName'), phoneModel: $('phoneModel'),
            timerBasic: $('timerBasic'), rollBasicBtn: $('rollBasicBtn'), totalOpened: $('totalOpened'), uniquePhones: $('uniquePhones'),
            bestRarity: $('bestRarity'), totalSold: $('totalSold'), balanceDisplay: $('balanceDisplay'),
            inventoryList: $('inventoryList'), achieveList: $('achieveList'), shopList: $('shopList'),
            screenMain: $('screenMain'), screenInventory: $('screenInventory'), screenShop: $('screenShop'), screenAchieve: $('screenAchieve'),
            resetBtn: $('resetBtn'), lowSpecBtn: $('lowSpecBtn'), langBtn: $('langBtn')
        };

        const fmtTime = s => `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;

        function applyLowSpecMode() {
            if (lowSpecMode) { document.body.classList.add('low-spec'); el.lowSpecBtn.classList.add('active'); el.lowSpecBtn.textContent = '⚡ ON'; }
            else { document.body.classList.remove('low-spec'); el.lowSpecBtn.classList.remove('active'); el.lowSpecBtn.textContent = '⚡'; }
        }

        function getBestTier() {
            return Object.keys(collection).reduce((max, name) => {
                const p = PHONE_MAP[name]; return p ? Math.max(max, RARITY[p.rarity].tier) : max;
            }, 0);
        }

        function updateStats() {
            uniqueByRarity = { common: 0, rare: 0, epic: 0, legendary: 0, mythic: 0, forbidden: 0 };
            const uniqueNames = Object.keys(collection);
            for (const name of uniqueNames) { const phone = PHONE_MAP[name]; if (phone) uniqueByRarity[phone.rarity]++; }
            el.totalOpened.textContent = totalOpened; el.uniquePhones.textContent = uniqueNames.length;
            el.totalSold.textContent = totalSold; el.balanceDisplay.textContent = balance;
            const bestTier = getBestTier();
            const bestKey = Object.keys(RARITY).find(k => RARITY[k].tier === bestTier);
            el.bestRarity.textContent = bestKey ? getRarityLabel(bestKey) : '-';
            el.bestRarity.style.color = bestKey ? RARITY[bestKey].color : '#888';
            el.rollBasicBtn.textContent = timerActiveBasic ? t('waiting') : t('rollBasicBtn');
        }

        function switchScreen(screen) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
            const screens = { main: el.screenMain, inventory: el.screenInventory, shop: el.screenShop, achieve: el.screenAchieve };
            if (screens[screen]) { screens[screen].classList.add('active'); document.querySelector(`.menu-btn[data-screen="${screen}"]`).classList.add('active'); }
            if (screen === 'inventory') renderInventory();
            if (screen === 'shop') renderShop();
            if (screen === 'achieve') renderAchievements();
        }

        function sellPhone(phoneName, btnElement) {
            if (!collection[phoneName] || collection[phoneName] <= 0) return;
            const phone = PHONE_MAP[phoneName]; if (!phone) return;
            const price = RARITY[phone.rarity].price;
            collection[phoneName]--; if (collection[phoneName] <= 0) delete collection[phoneName];
            balance += price; totalSold++;
            updateStats(); save();
            if (btnElement) {
                const flash = document.createElement('span'); flash.className = 'sell-flash'; flash.textContent = `+${price} 💰`;
                btnElement.appendChild(flash); setTimeout(() => flash.remove(), 1000);
            }
            renderInventory();
        }

        function sellAllCommon() {
            if (!confirm(t('confirmSellAll'))) return;
            let earned = 0;
            for (const name in collection) {
                const phone = PHONE_MAP[name];
                if (phone && phone.rarity === 'common') {
                    earned += collection[name] * RARITY.common.price;
                    totalSold += collection[name];
                    delete collection[name];
                }
            }
            if (earned > 0) { balance += earned; updateStats(); save(); renderInventory(); }
        }

        function renderInventory() {
            let html = '';
            
            // 1. Баннер кейсов (если есть)
            if (caseCount > 0) {
                html += `<div class="case-banner">
                    <img class="case-banner-icon" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='80' font-size='80'%3E📦%3C/text%3E%3C/svg%3E" alt="Кейс">
                    <div class="case-banner-info">
                        <div class="case-banner-name">${t('caseItemName')}</div>
                        <div class="case-banner-desc">${t('caseItemDesc')}</div>
                    </div>
                    <button class="btn-open-case" id="openCaseBtn">${t('openCaseBtn')} (x${caseCount})</button>
                </div>`;
            }

            // 2. Кнопки сортировки и продажи (ОТРИСОВЫВАЮТСЯ ВСЕГДА)
            let hasCommons = Object.keys(collection).some(name => PHONE_MAP[name]?.rarity === 'common');
            html += `<div class="inv-controls">
                <button class="sort-btn ${inventorySort === 'default' ? 'active' : ''}" data-sort="default">${t('sortDefault')}</button>
                <button class="sort-btn ${inventorySort === 'rarity' ? 'active' : ''}" data-sort="rarity">${t('sortRarity')}</button>
                <button class="sort-btn ${inventorySort === 'count' ? 'active' : ''}" data-sort="count">${t('sortCount')}</button>
                ${hasCommons ? `<button class="btn-sell-all" id="sellAllBtn">${t('sellAllCommon')}</button>` : ''}
            </div>`;

            // 3. Подготовка телефонов
            let keys = Object.keys(collection).filter(name => collection[name] > 0 && PHONE_MAP[name]);

            if (inventorySort === 'rarity') {
                keys.sort((a, b) => RARITY[PHONE_MAP[a].rarity].tier - RARITY[PHONE_MAP[b].rarity].tier);
            } else if (inventorySort === 'count') {
                keys.sort((a, b) => collection[b] - collection[a]);
            }

            // 4. Если пусто - показываем текст. Если нет - рисуем сетку
            if (keys.length === 0) {
                html += `<div class="empty-msg">${t('emptyInventory')}</div>`;
            } else {
                html += `<div class="inv-grid">`;
                for (const name of keys) {
                    const count = collection[name];
                    const phone = PHONE_MAP[name];
                    const cfg = RARITY[phone.rarity];
                    html += `<div class="inv-card rarity-${phone.rarity}">
                        <span class="inv-card-count">x${count}</span>
                        <img class="inv-card-img" src="${escapeHtml(phone.image)}" alt="${escapeHtml(name)}" style="color: ${cfg.color}">
                        <div class="inv-card-name">${escapeHtml(name)}</div>
                        <div class="inv-card-rarity" style="color: ${cfg.color}">${getRarityLabel(phone.rarity)}</div>
                        <button class="btn-sell-card" data-phone='${escapeHtml(name)}'>${t('shopCasePrice')} ${cfg.price} 💰</button>
                    </div>`;
                }
                html += `</div>`;
            }

            el.inventoryList.innerHTML = html;

            // Навешиваем события
            document.querySelectorAll('.btn-sell-card').forEach(btn => {
                btn.addEventListener('click', function() { sellPhone(this.getAttribute('data-phone'), this); });
            });
            const openCaseBtn = document.getElementById('openCaseBtn');
            if (openCaseBtn) openCaseBtn.addEventListener('click', openCase);
            
            const sellAllBtn = document.getElementById('sellAllBtn');
            if (sellAllBtn) sellAllBtn.addEventListener('click', sellAllCommon);

            document.querySelectorAll('.sort-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    inventorySort = this.getAttribute('data-sort');
                    renderInventory();
                });
            });
        }

        function openCase() {
            if (caseCount <= 0) return; caseCount--;
            const roll = Math.random() * 100; let rarity = 'rare', cumulative = 0;
            for (const key of ['rare', 'epic', 'legendary', 'mythic', 'forbidden']) { cumulative += CASE_CHANCES[key]; if (roll < cumulative) { rarity = key; break; } }
            const pool = CASE_PHONES.filter(p => p.rarity === rarity);
            const phone = pool[Math.floor(Math.random() * pool.length)];
            applyPhoneDisplay(phone); collection[phone.name] = (collection[phone.name] || 0) + 1;
            totalOpened++; updateStats(); checkAchievements(phone); save(); renderInventory();
            setTimeout(() => switchScreen('main'), 400);
        }

        function renderShop() {
            let html = `<div class="shop-item">
                <img class="shop-icon" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='80' font-size='80'%3E📦%3C/text%3E%3C/svg%3E" alt="Кейс">
                <div class="shop-info">
                    <div class="shop-name">${t('shopCaseName')}</div>
                    <div style="color:#aaa;font-size:12px;">${t('shopCaseDesc')}</div>
                    <div style="color:#ffd700;font-size:14px;">${t('shopCasePrice')} ${CASE_PRICE} 💰</div>
                </div>
                <button class="btn btn-case" id="buyCaseBtn" style="width:auto; padding:8px 16px; font-size:14px;">${t('buyCaseBtn')}</button>
            </div>`;
            el.shopList.innerHTML = html;
            const buyBtn = document.getElementById('buyCaseBtn'); if (buyBtn) buyBtn.addEventListener('click', buyCase);
        }

        function buyCase() {
            if (balance < CASE_PRICE) { alert(t('notEnoughCoins')); return; }
            balance -= CASE_PRICE; caseCount++; updateStats(); save(); renderShop(); renderInventory();
        }

        function checkAchievements(phone) {
            const stats = { totalOpened, bestTier: getBestTier(), uniqueByRarity }; let changed = false;
            for (const ach of ACHIEVEMENTS) {
                if (unlockedAchievements.includes(ach.id)) continue;
                if (ach.check.length > 1 && phone) { if (ach.check(stats, phone)) { unlockedAchievements.push(ach.id); changed = true; } }
                else if (ach.check(stats)) { unlockedAchievements.push(ach.id); changed = true; }
            }
            if (changed) { renderAchievements(); save(); }
        }

        function renderAchievements() {
            let html = '';
            for (const ach of ACHIEVEMENTS) {
                const unlocked = unlockedAchievements.includes(ach.id);
                const achName = ach.name[currentLang] || ach.name.ru;
                const achDesc = unlocked ? (ach.desc[currentLang] || ach.desc.ru) : t('achievementLockedDesc');
                html += `<div class="achieve-item ${unlocked ? 'unlocked' : ''}">
                    <div class="achieve-icon">${ach.icon}</div>
                    <div class="achieve-info">
                        <div class="achieve-name">${unlocked ? escapeHtml(achName) : '???'}</div>
                        <div class="achieve-desc">${escapeHtml(achDesc)}</div>
                    </div>
                </div>`;
            }
            el.achieveList.innerHTML = html;
        }

        function save() {
            const data = { collection, totalOpened, totalSold, balance, caseCount, unlockedAchievements,
                timerRemainingBasic: timerActiveBasic ? Math.max(0, timerRemainingBasic - (performance.now() - timerStartBasic) / 1000) : 0, lowSpecMode };
            localStorage.setItem(SAVE_KEY, JSON.stringify(data));
        }

        function load() {
            try {
                const raw = localStorage.getItem(SAVE_KEY); if (!raw) return; const data = JSON.parse(raw);
                if (data.collection && typeof data.collection === 'object' && !Array.isArray(data.collection)) collection = data.collection;
                else { collection = {}; if (Array.isArray(data.collection)) data.collection.forEach(p => { collection[p.name] = (collection[p.name] || 0) + 1; }); }
                totalOpened = data.totalOpened || 0; totalSold = data.totalSold || 0; balance = data.balance || 0;
                caseCount = data.caseCount || 0; unlockedAchievements = data.unlockedAchievements || [];
                lowSpecMode = data.lowSpecMode || false; applyLowSpecMode(); updateStats(); renderAchievements();
                let remainingBasic = data.timerRemainingBasic || 0;
                if (remainingBasic > COOLDOWN_BASIC + 10) remainingBasic = COOLDOWN_BASIC;
                if (remainingBasic > 0) startTimer('basic', Math.ceil(remainingBasic)); else clearTimer('basic');
            } catch (e) { collection = {}; totalOpened = 0; totalSold = 0; balance = 0; caseCount = 0; unlockedAchievements = []; }
        }

        function resetGame() {
            if (!confirm(t('confirmReset'))) return; localStorage.removeItem(SAVE_KEY);
            collection = {}; totalOpened = 0; totalSold = 0; balance = 0; caseCount = 0; unlockedAchievements = [];
            clearTimer('basic');
            el.phoneImage.src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='80' font-size='80'%3E📦%3C/text%3E%3C/svg%3E";
            el.phoneName.textContent = '???'; el.phoneName.style.color = '#fff';
            el.phoneModel.textContent = t('phoneModelDefault'); el.phoneModel.style.color = 'rgba(255,255,255,0.7)';
            el.phoneDisplay.style.borderColor = 'transparent'; el.phoneDisplay.style.boxShadow = 'none';
            updateStats(); renderInventory(); renderShop(); renderAchievements();
        }

        function clearTimer(type) {
            if (type === 'basic') {
                if (timerIdBasic) clearInterval(timerIdBasic); timerIdBasic = null; timerActiveBasic = false; timerRemainingBasic = 0;
                el.rollBasicBtn.disabled = false; el.rollBasicBtn.textContent = t('rollBasicBtn'); el.timerBasic.textContent = '00:00';
            }
        }

        function tick(type) {
            if (type === 'basic') {
                const left = Math.max(0, Math.ceil(timerRemainingBasic - (performance.now() - timerStartBasic) / 1000));
                el.timerBasic.textContent = fmtTime(left); if (left <= 0) { clearTimer('basic'); save(); }
            }
        }

        function startTimer(type, seconds) {
            if (type === 'basic') {
                if (timerIdBasic) clearInterval(timerIdBasic); timerRemainingBasic = seconds; timerStartBasic = performance.now(); timerActiveBasic = true;
                el.rollBasicBtn.disabled = true; el.rollBasicBtn.textContent = t('waiting');
                tick('basic'); timerIdBasic = setInterval(() => tick('basic'), 500); save();
            }
        }

        function applyPhoneDisplay(phone) {
            const cfg = RARITY[phone.rarity]; el.phoneImage.src = phone.image; el.phoneImage.style.color = cfg.color;
            el.phoneName.textContent = phone.name; el.phoneName.style.color = cfg.color;
            el.phoneModel.textContent = `${getRarityLabel(phone.rarity)} • ${phone.year}`; el.phoneModel.style.color = cfg.color;
            el.phoneDisplay.style.borderColor = cfg.color; el.phoneDisplay.style.boxShadow = cfg.glow;
            if (phone.rarity === 'forbidden') { el.phoneName.classList.add('rarity-forbidden'); el.phoneModel.classList.add('rarity-forbidden'); }
            else { el.phoneName.classList.remove('rarity-forbidden'); el.phoneModel.classList.remove('rarity-forbidden'); }
            el.phoneImage.style.animation = 'none'; void el.phoneImage.offsetWidth; el.phoneImage.style.animation = 'bounceIn 0.5s';
        }

        function rollBasicPhone() {
            if (timerActiveBasic) return;
            const phone = BASIC_PHONES[Math.floor(Math.random() * BASIC_PHONES.length)];
            applyPhoneDisplay(phone); collection[phone.name] = (collection[phone.name] || 0) + 1;
            totalOpened++; updateStats(); checkAchievements(phone); save(); startTimer('basic', COOLDOWN_BASIC);
        }

        function toggleLowSpec() { lowSpecMode = !lowSpecMode; applyLowSpecMode(); save(); }

        el.rollBasicBtn.addEventListener('click', rollBasicPhone);
        el.resetBtn.addEventListener('click', resetGame);
        el.lowSpecBtn.addEventListener('click', toggleLowSpec);
        el.langBtn.addEventListener('click', () => { setLanguage(currentLang === 'uk' ? 'ru' : 'uk'); });
        document.querySelectorAll('.menu-btn').forEach(btn => { btn.addEventListener('click', () => switchScreen(btn.dataset.screen)); });

        loadLanguage(); renderShop(); renderAchievements(); load(); updateStats();
    })();
    </script>
</body>
</html>
